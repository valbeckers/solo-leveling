
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation}
:root{--rc:#9ca3af;--rg:#9ca3af55;--ra:#6b7280;--bg:#0a0a0f;--sf:rgba(255,255,255,0.03);--sf2:rgba(255,255,255,0.06);--tx:#e2e8f0;--td:#64748b}
html,body{height:100%;background:#0a0a0f;color:var(--tx);font-family:'Rajdhani',sans-serif;overflow-x:hidden}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:80px;background:#0a0a0f}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;animation:floatP linear infinite}
@keyframes floatP{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100px) scale(1);opacity:0}}
.hdr{position:sticky;top:0;z-index:100;background:#0a0a0f;padding:54px 20px 12px}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.pname{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--rc);text-shadow:0 0 20px var(--rg);letter-spacing:3px}
.gbtn{background:none;border:none;width:43px;height:43px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;color:var(--rc);opacity:.8}
.xpbar{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.xpfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ra),var(--rc));box-shadow:0 0 8px var(--rg);transition:width .6s}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:430px;max-width:100vw;background:#0a0a0f;display:flex;z-index:200}
.nbtn{flex:1;padding:12px 0;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--td);font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;transition:color .2s}
.nbtn.on{color:var(--rc)}
.nicon{font-size:20px}
.tab{padding:16px 16px 0;position:relative;z-index:1}
.card{background:var(--sf);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--rc),transparent);opacity:.4}
.ctitle{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:var(--rc);text-transform:uppercase;margin-bottom:12px}
.qi{background:var(--sf2);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px;margin-bottom:8px}
.qi.done{border-color:var(--rc)}
.qhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.qname{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.qrow{display:flex;align-items:center;gap:10px}
.qbar{flex:1;height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.qfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ra),var(--rc));transition:width .4s}
.qfill.done{background:linear-gradient(90deg,#16a34a,#4ade80);box-shadow:0 0 6px #4ade8088}
.qfill.over{background:linear-gradient(90deg,#d97706,#f59e0b);box-shadow:0 0 6px #f59e0b88}
.qxp{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--rc);min-width:50px;text-align:right}
.qinrow{display:flex;gap:8px;margin-top:8px}
.qin{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--rc);border-radius:8px;padding:8px 12px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;opacity:.8}
.qbtn{background:rgba(255,255,255,0.05);border:1px solid var(--rc);border-radius:8px;padding:8px 14px;color:var(--rc);cursor:pointer;font-family:'Orbitron',sans-serif;font-size:11px}
.xpfloat{position:fixed;pointer-events:none;z-index:800;font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--rc);text-shadow:0 0 16px var(--rg),0 0 32px var(--rg);animation:fup 2.2s ease-out forwards;left:50%;transform:translateX(-50%)}
@keyframes fup{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}20%{opacity:1;transform:translateX(-50%) translateY(-20px) scale(1.2)}100%{opacity:0;transform:translateX(-50%) translateY(-120px) scale(0.8)}}
.warn{background:#ef444411;border:1px solid #ef444466;border-radius:10px;padding:12px 16px;margin-bottom:12px;font-size:13px;color:#ef4444}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#0d0d18;border:1px solid var(--rc);border-radius:20px 20px 0 0;width:430px;max-width:100vw;max-height:85vh;overflow-y:auto;padding:24px 20px}
.mtitle{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--rc);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.mlbl{font-size:12px;color:var(--td);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.msec{margin-bottom:20px}
.min{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--rc);border-radius:8px;padding:10px 14px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;margin-bottom:8px;opacity:.8}
.mbtn{flex:1;padding:12px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;text-transform:uppercase}
.mprim{background:rgba(255,255,255,0.05);border:1px solid var(--rc);color:var(--rc)}
.mdng{background:#ef444411;border:1px solid #ef444466;color:#ef4444}
.mcan{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--td)}
.mrow{display:flex;gap:8px}
.addbtn{background:rgba(255,255,255,0.03);border:1px solid var(--rc);border-radius:8px;padding:5px 12px;color:var(--rc);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1px;cursor:pointer;opacity:.8}
.addform{background:var(--sf);border:1px dashed var(--rc);border-radius:10px;padding:14px;margin-top:8px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ff{grid-column:1/-1}
.fin{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--rc);border-radius:8px;padding:8px 12px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;opacity:.8}
.fsel{width:100%;background:#0d0d18;border:1px solid var(--rc);border-radius:8px;padding:8px 12px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none}
.fck{font-size:12px;display:flex;align-items:center;gap:6px;color:var(--td)}
.delbtn{background:none;border:none;cursor:pointer;font-size:14px;color:#ef444488;padding:2px 6px;border-radius:4px}
.shdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.schr{margin-bottom:12px}
.schn{display:flex;justify-content:space-between;font-size:13px;font-weight:600;letter-spacing:1px;color:var(--tx);margin-bottom:5px}
.schlvl{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--rc)}
.schb{height:8px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden}
.schf{height:100%;border-radius:4px;transition:width .6s}
.rpath{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.rnode{display:flex;flex-direction:column;align-items:center;gap:4px}
.rcirc{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;border:2px solid;transition:all .3s}
.rname{font-size:9px;letter-spacing:1px;text-transform:uppercase}
.rconn{flex:1;height:2px;margin:0 4px;margin-bottom:16px}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wday{display:flex;flex-direction:column;align-items:center;gap:3px}
.wdlbl{font-size:9px;color:var(--td);text-transform:uppercase;letter-spacing:1px}
.wddot{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'Orbitron',sans-serif}
.ruov{position:fixed;inset:0;z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.95)}
.rulines{position:absolute;inset:0;overflow:hidden}
.ruline{position:absolute;height:2px;width:200px;background:linear-gradient(90deg,transparent,var(--rc),transparent);animation:shoot 1.5s linear infinite}
@keyframes shoot{0%{transform:translateX(-220px) rotate(var(--ang));opacity:0}50%{opacity:1}100%{transform:translateX(calc(100vw + 220px)) rotate(var(--ang));opacity:0}}
.rucont{text-align:center;z-index:1}
.rurank{font-family:'Orbitron',sans-serif;font-size:100px;font-weight:900;color:var(--rc);text-shadow:0 0 60px var(--rg)}
.rutitle{font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:5px;color:var(--td);text-transform:uppercase;margin-bottom:12px}
.rulabel{font-family:'Orbitron',sans-serif;font-size:20px;letter-spacing:6px;color:var(--rc);margin-top:8px;text-transform:uppercase}
.rudis{margin-top:40px;background:rgba(255,255,255,0.05);border:1px solid var(--rc);border-radius:8px;padding:12px 32px;color:var(--rc);font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;cursor:pointer;text-transform:uppercase}
.sqcard{background:linear-gradient(135deg,rgba(239,68,68,0.08),rgba(220,38,38,0.04));border:1px solid #ef444444;border-radius:10px;padding:12px;margin-bottom:8px}
.sq-urgent{animation:urgentPulse 1s ease-in-out infinite}
@keyframes urgentPulse{0%,100%{box-shadow:0 0 0 0 #ef444444}50%{box-shadow:0 0 0 6px #ef444400}}
.sqbar{height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;margin:6px 0}
.sqbarfill{height:100%;border-radius:2px;background:linear-gradient(90deg,#991b1b,#ef4444);transition:width .4s}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--rc),transparent);margin:8px 0 16px;opacity:.3}
</style>

<body>
<div id="app"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Orbitron,sans-serif;color:#9ca3af;gap:16px"><div style="font-size:48px">&#x2694;</div><div style="font-size:12px;letter-spacing:4px">CHARGEMENT...</div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/preact/10.27.2/preact.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/preact/10.27.2/hooks.umd.min.js"></script>
<script>
const { h, render, Fragment } = preact;
const { useState, useEffect, useRef } = preactHooks;

// ─── CONSTANTES GLOBALES ────────────────────────────────────────────────────

const RANKS = [
  {id:"E",label:"\u00c9veill\u00e9",  color:"#9ca3af",glow:"#9ca3af55",bg:"#0a0a0f",accent:"#6b7280",xpRequired:0},
  {id:"D",label:"Aventurier",color:"#22d3ee",glow:"#22d3ee55",bg:"#0a0a0f",accent:"#06b6d4",xpRequired:3000},
  {id:"C",label:"Combattant",color:"#4ade80",glow:"#4ade8055",bg:"#0a0a0f",accent:"#22c55e",xpRequired:9000},
  {id:"B",label:"Chasseur",  color:"#f59e0b",glow:"#f59e0b55",bg:"#0a0a0f",accent:"#d97706",xpRequired:21000},
  {id:"A",label:"Expert",    color:"#f87171",glow:"#f87171aa",bg:"#0a0a0f",accent:"#ef4444",xpRequired:45000},
  {id:"S",label:"Ma\u00eetre",color:"#c084fc",glow:"#c084fcaa",bg:"#0a0a0f",accent:"#a855f7",xpRequired:93000},
];

const STATS      = ["Vitalite","Force","Esprit","Endurance","Discipline"];
const STAT_COLOR = {Vitalite:"#ef4444",Force:"#4ade80",Esprit:"#f59e0b",Endurance:"#22d3ee",Discipline:"#c084fc"};
const STAT_LBL   = {Vitalite:"Vitalit\u00e9",Force:"Force",Esprit:"Esprit",Endurance:"Endurance",Discipline:"Discipline"};

const DEFS = [
  {id:"push",   name:"Pompes",         unit:"reps", xpPer:1,  daily:true, weekly:false,optional:false,stat:"Force",    icon:"\uD83E\uDDBE",              base:30},
  {id:"abs",    name:"Abdominaux",     unit:"reps", xpPer:1,  daily:true, weekly:false,optional:false,stat:"Force",    icon:"\uD83E\uDDCE\uD83C\uDFFB",  base:60},
  {id:"squats", name:"Squats",         unit:"reps", xpPer:1,  daily:true, weekly:false,optional:false,stat:"Force",    icon:"\uD83E\uDDBF",              base:15},
  {id:"water",  name:"Hydratation",    unit:"verres",xpPer:5, daily:true, weekly:false,optional:false,stat:"Vitalite", icon:"\uD83D\uDCA7",              base:8},
  {id:"reading",name:"Lecture",        unit:"pages",xpPer:5,  daily:true, weekly:false,optional:false,stat:"Esprit",   icon:"\uD83D\uDCDA",              base:10},
  {id:"run",    name:"Course",         unit:"km",   xpPer:50, daily:false,weekly:true, optional:false,stat:"Endurance",icon:"\uD83C\uDFC3\uD83C\uDFFB",  base:7},
  {id:"med",    name:"M\u00e9ditation",unit:"min",  xpPer:5,  daily:true, weekly:false,optional:true, stat:"Esprit",   icon:"\uD83E\uDDD8\uD83C\uDFFB",  base:5},
  {id:"flex",   name:"Souplesse",      unit:"min",  xpPer:5,  daily:true, weekly:false,optional:true, stat:"Vitalite", icon:"\uD83E\uDD38\uD83C\uDFFB",  base:5},
  {id:"sleep",  name:"Sommeil",        unit:"nuit", xpPer:0,  daily:true, weekly:false,optional:true, stat:"Vitalite", icon:"\uD83D\uDECF\uFE0F",        base:1, binary:true, binaryXp:50},
  {id:"nosugar",name:"Sans sucres",    unit:"jour", xpPer:0,  daily:true, weekly:false,optional:true, stat:"Vitalite", icon:"\uD83D\uDEAB",              base:1, binary:true, binaryXp:200},
];

// Quetes speciales — 5 par stat
const SP = {
  Force:[
    {id:"sp_dips",   name:"Dips",              icon:"\uD83D\uDCAA",unit:"reps",   target:50,  xp:300,days:1,desc:"50 dips en 24h"},
    {id:"sp_pull",   name:"Tractions",          icon:"\uD83C\uDFCB\uFE0F",unit:"reps",target:30,xp:300,days:1,desc:"30 tractions en 24h"},
    {id:"sp_lunge",  name:"Fentes march\u00e9es",icon:"\uD83E\uDDB5",unit:"pas",  target:200, xp:200,days:1,desc:"200 pas de fentes en 24h"},
    {id:"sp_plank",  name:"Gainage",            icon:"\uD83D\uDCAA",unit:"min",   target:10,  xp:150,days:1,desc:"10 min cumul\u00e9es en 24h"},
    {id:"sp_200push",name:"200 pompes",         icon:"\uD83E\uDDBE",unit:"reps",  target:200, xp:350,days:1,desc:"200 pompes en une s\u00e9ance"},
  ],
  Esprit:[
    {id:"sp_pod",   name:"Podcast",             icon:"\uD83C\uDF99\uFE0F",unit:"\u00e9p.",target:1,xp:100,days:1,desc:"1 podcast complet en 24h"},
    {id:"sp_50p",   name:"50 pages",            icon:"\uD83D\uDCDA",unit:"pages", target:50,  xp:250,days:1,desc:"50 pages en une journ\u00e9e"},
    {id:"sp_med30", name:"M\u00e9ditation 30min",icon:"\uD83E\uDDD8\uD83C\uDFFB",unit:"min",target:30,xp:200,days:1,desc:"30 min en une s\u00e9ance"},
    {id:"sp_learn", name:"Apprentissage",       icon:"\uD83E\uDDE0",unit:"s\u00e9ances",target:3,xp:200,days:1,desc:"3 s\u00e9ances d'apprentissage"},
    {id:"sp_write", name:"Journaling",          icon:"\u270D\uFE0F",unit:"mots",  target:500, xp:150,days:1,desc:"500 mots \u00e9crits en 24h"},
  ],
  Endurance:[
    {id:"sp_jump",    name:"Corde \u00e0 sauter",icon:"\uD83E\uDE62",unit:"min",  target:20,  xp:250,days:1,desc:"20 min non-stop"},
    {id:"sp_sprint",  name:"Sprints",            icon:"\u26A1",      unit:"s\u00e9ries",target:10,xp:300,days:1,desc:"10 x 100m sprint/r\u00e9cup"},
    {id:"sp_5km",     name:"5km d'une traite",   icon:"\uD83C\uDFC3\uD83C\uDFFB",unit:"km",target:5,xp:300,days:1,desc:"5km sans s'arr\u00eater"},
    {id:"sp_5sess",   name:"5 s\u00e9ances cardio",icon:"\uD83D\uDD25",unit:"s\u00e9ances",target:5,xp:350,days:1,desc:"5 s\u00e9ances cardio en 24h"},
    {id:"sp_30cardio",name:"30 min cardio",      icon:"\uD83E\uDE96",unit:"min",  target:30,  xp:300,days:1,desc:"30 min cardio non-stop"},
  ],
  Vitalite:[
    {id:"sp_nosg",   name:"Sans sucre",          icon:"\uD83E\uDD57",unit:"jours",target:5,   xp:300,days:1,desc:"5 jours sans junk food"},
    {id:"sp_flex30", name:"Souplesse 30min",     icon:"\uD83E\uDD38\uD83C\uDFFB",unit:"min",target:30,xp:150,days:1,desc:"30 min de souplesse en une s\u00e9ance"},
    {id:"sp_sleep22",name:"Coucher t\u00f4t",    icon:"\uD83D\uDECF\uFE0F",unit:"nuits",target:3,xp:200,days:1,desc:"Dormir avant 22h30 - 3 nuits"},
    {id:"sp_fasting",name:"Je\u00fbne 16h",      icon:"\u23F3",      unit:"fois",  target:3,   xp:300,days:1,desc:"Je\u00fbne 16h - 3 fois en 24h"},
    {id:"sp_fruits", name:"5 fruits/l\u00e9gumes",icon:"\uD83E\uDD57",unit:"jours",target:4, xp:250,days:1,desc:"5 fruits/l\u00e9gumes/jour - 4 jours"},
  ],
};

// ─── FONCTIONS UTILITAIRES GLOBALES ────────────────────────────────────────

const getRank    = xp => { for(let i=RANKS.length-1;i>=0;i--)if(xp>=RANKS[i].xpRequired)return RANKS[i]; return RANKS[0]; };
const getNext    = id => { const i=RANKS.findIndex(r=>r.id===id); return i<RANKS.length-1?RANKS[i+1]:null; };

// Progression des objectifs par rang (linéaire E->S)
const RANK_BASES = {
  push:    [30, 44, 58,  72,  86,  100],
  abs:     [60, 88, 116, 144, 172, 200],
  squats:  [15, 22, 29,  36,  43,  50],
  reading: [10, 14, 18,  22,  26,  30],
  run:     [7,  10, 12,  15,  17,  20],
};

function getRankBase(objId, rankIdx){
  return RANK_BASES[objId]?.[rankIdx] ?? (DEFS.find(o=>o.id===objId)?.base ?? 0);
}
const getTarget  = base => base; // pas de scaling rang pour l'instant
const todayStr   = () => new Date().toISOString().slice(0,10);
const wkStr      = (d=new Date()) => {
  // Semaine ISO : commence le lundi
  const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=dt.getUTCDay()||7; // dimanche=7
  dt.setUTCDate(dt.getUTCDate()+4-day); // jeudi de la semaine ISO
  const yearStart=new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  const wk=Math.ceil(((dt-yearStart)/86400000+1)/7);
  return dt.getUTCFullYear()+"-W"+String(wk).padStart(2,"0");
};
const sortStat   = arr => [...arr].sort((a,b)=>STATS.indexOf(a.stat)-STATS.indexOf(b.stat));
const xpForLvl   = l => Math.round(100*Math.pow(2,l));
const totForLvl  = l => { let t=0; for(let i=0;i<l;i++)t+=xpForLvl(i); return t; };
const getLvl     = xp => { let l=0; while(xp>=totForLvl(l+1))l++; return l; };

function calcXp(obj,total){
  if(!obj||total<=0)return 0;
  if(obj.binary){return total>=obj.base?(obj.binaryXp||50):0;}
  const t=obj.base;
  if(total<=t)return total*obj.xpPer;
  return t*obj.xpPer+(total-t)*obj.xpPer*1.5;
}

function pickRandomSq(usedIds){
  const stats=["Force","Esprit","Endurance","Vitalite"];
  const stat=stats[Math.floor(Math.random()*4)];
  const avail=(SP[stat]||[]).filter(t=>!usedIds.includes(t.id));
  if(avail.length===0){
    for(const s of stats.filter(x=>x!==stat)){
      const a=(SP[s]||[]).filter(t=>!usedIds.includes(t.id));
      if(a.length>0)return {...a[Math.floor(Math.random()*a.length)],stat:s};
    }
    return null;
  }
  return {...avail[Math.floor(Math.random()*avail.length)],stat};
}

const loadState  = () => { try{ const r=localStorage.getItem("sl_v3"); return r?JSON.parse(r):null; }catch{return null;} };
const saveState  = s  => { try{ localStorage.setItem("sl_v3",JSON.stringify(s)); }catch{} };

// ─── DONNEES IMPORTEES ─────────────────────────────────────────────────────

const IMPORTED = {
  totalXp:4161.5, streak:4, lastActiveDay:"2026-04-11",
  streakBonusDay:"2026-04-10", weeklyBonusWk:"2026-W15", lastStreakDay:"2026-04-10",
  dailyLog:{
    "2026-04-06":{water:8,push:36,abs:72,sleep:1},
    "2026-04-07":{water:8,push:36,abs:72,squats:15,reading:11,flex:5,sleep:1,med:6},
    "2026-04-08":{water:11,push:100,abs:115,squats:35,reading:48,sleep:1,med:6,flex:20},
    "2026-04-09":{water:9,sleep:1,push:41,abs:64,squats:16,reading:13,flex:0,med:0},
    "2026-04-10":{water:13,sleep:1,push:77,abs:110,squats:40,reading:14,flex:5,med:20},
    "2026-04-11":{water:2,push:45,sleep:1,abs:90,flex:2,squats:25}
  },
  weeklyLog:{"2026-W15":{run:11.5}},
  stats:{Vitalite:3,Force:3,Esprit:3,Endurance:2,Discipline:2},
  statXp:{Vitalite:775,Force:1301.5,Esprit:747.5,Endurance:687.5,Discipline:650},
  specialQuests:[{id:"sp_pull",name:"Tractions",icon:"\uD83C\uDFCB\uFE0F",unit:"reps",target:30,xp:300,days:1,desc:"30 tractions en 24h",stat:"Force",sqid:"sq_1775836505456",progress:20,startedAt:1775836505456,expiresAt:1775922905456,completedAt:null}],
  objectives:DEFS,
};

function buildState(){
  const saved=loadState();
  if(!saved)return IMPORTED;
  return {
    ...IMPORTED,
    ...saved,
    objectives:DEFS,
    specialQuests:saved.specialQuests||[],
    stats:saved.stats||IMPORTED.stats,
    statXp:saved.statXp||IMPORTED.statXp,
    dailyLog:saved.dailyLog||IMPORTED.dailyLog,
    weeklyLog:saved.weeklyLog||IMPORTED.weeklyLog,
    // Ne jamais garder un totalXp inférieur à ce qu'on a calculé
    totalXp:Math.max(saved.totalXp||0, IMPORTED.totalXp),
  };
}

// ─── COMPOSANT PRINCIPAL ───────────────────────────────────────────────────

function App(){
  const [state,setState]   = useState(()=>{
    const base=buildState();
    // Auto-init quete speciale si aucune active
    const now=Date.now();
    const sqs=base.specialQuests||[];
    const hasActive=sqs.find(q=>!q.completedAt&&now<q.expiresAt);
    const hasRecent=sqs.find(q=>q.completedAt&&(now-q.completedAt)<86400000);
    if(!hasActive&&!hasRecent){
      const tpl=pickRandomSq(sqs.map(q=>q.id));
      if(tpl){
        const sq={...tpl,sqid:"sq_"+now,progress:0,startedAt:now,expiresAt:now+tpl.days*86400000,completedAt:null};
        return {...base,specialQuests:[...sqs.filter(q=>q.completedAt),sq]};
      }
    }
    return base;
  });
  const [tab,setTab]       = useState("home");
  const [rankUp,setRankUp] = useState(null);
  const [floats,setFloats] = useState([]);
  const [showAdd,setShowAdd]       = useState(false);
  const [editObj,setEditObj]       = useState(null);
  const [showSet,setShowSet]       = useState(false);
  const [confirmReset,setConfirmReset] = useState(false);
  const [confirmDelete,setConfirmDelete] = useState(null);
  const [wkOff,setWkOff]  = useState(0);
  const inputs = useRef({});

  // Persistance
  useEffect(()=>{ saveState(state); },[state]);

  // Penalite jours manques (une seule fois au montage)
  useEffect(()=>{
    const t=todayStr();
    if(state.lastActiveDay&&state.lastActiveDay!==t){
      const diff=Math.round((new Date(t)-new Date(state.lastActiveDay))/86400000);
      if(diff>=2)setState(s=>({...s,totalXp:Math.max(0,s.totalXp-diff*10),streak:0}));
    }
  },[]);

  // ─── CALCULS DERIVES (dans l'ordre, sans circularite) ──────────────────

  const today = todayStr();
  const wk    = wkStr();
  const objs  = state.objectives||DEFS;
  const tLog  = state.dailyLog[today]||{};
  const wLog  = state.weeklyLog[wk]||{};

  const effectiveXp = state.totalXp;
  const rank     = getRank(effectiveXp);
  const nextRank = getNext(rank.id);
  const ri       = RANKS.findIndex(r=>r.id===rank.id);

  // 5. Progression XP dans le rang
  const xpInRank = effectiveXp - rank.xpRequired;
  const xpToNext = nextRank ? nextRank.xpRequired - rank.xpRequired : 1;
  const rankPct  = nextRank ? Math.min(100,(xpInRank/xpToNext)*100) : 100;

  // 6. XP du jour
  const todayXp = Object.entries(tLog).reduce((s,[id,a])=>{
    const o=objs.find(x=>x.id===id); return s+(o?calcXp(o,a):0);
  },0) + Object.entries(wLog).reduce((s,[id,a])=>{
    const o=objs.find(x=>x.id===id&&x.weekly); return s+(o?calcXp(o,a):0);
  },0);

  // 7. Quetes journalieres obligatoires toutes faites ?
  const reqDailyObjs  = objs.filter(o=>!o.optional&&o.daily);
  const allDailyDone  = reqDailyObjs.every(o=>(tLog[o.id]||0)>=getRankBase(o.id,ri));

  // 8. Streak : calculé depuis dailyLog mais ne descend jamais sous le streak sauvegardé si hier était complet
  const computedStreak = (()=>{
    let streak=0, d=new Date(today);
    for(let i=0;i<365;i++){
      const dk=d.toISOString().slice(0,10);
      const log=state.dailyLog[dk]||{};
      if(!reqDailyObjs.every(o=>(log[o.id]||0)>=o.base))break;
      streak++; d.setDate(d.getDate()-1);
    }
    // Si aujourd'hui est incomplet, le streak "en cours" = streak des jours passés
    // On prend le max entre ce qui est calculé et le streak sauvegardé
    // pour éviter de perdre le streak affiché pendant la journée
    const yesterday=new Date(today);yesterday.setDate(yesterday.getDate()-1);
    const yk=yesterday.toISOString().slice(0,10);
    const yesterdayLog=state.dailyLog[yk]||{};
    const yesterdayDone=reqDailyObjs.every(o=>(yesterdayLog[o.id]||0)>=o.base);
    // Si hier était complet, on affiche au moins le streak sauvegardé
    if(yesterdayDone && streak===0) return state.streak;
    return streak;
  })();

  // 9. Bonus hebdo
  const weeklyDone = (()=>{
    const weeklyOk=objs.filter(o=>!o.optional&&o.weekly).every(o=>(wLog[o.id]||0)>=getRankBase(o.id,ri));
    if(!weeklyOk)return false;
    const ws=new Date(); ws.setDate(ws.getDate()-((ws.getDay()+6)%7)); ws.setHours(0,0,0,0);
    const days=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d.toISOString().slice(0,10);});
    if(days.some(d=>d>today))return false;
    return reqDailyObjs.every(o=>days.every(d=>(state.dailyLog[d]?.[o.id]||0)>=getRankBase(o.id,ri)));
  })();

  // 10. Quete speciale
  const now         = Date.now();
  const sqs         = state.specialQuests||[];
  const activeSq    = sqs.find(q=>!q.completedAt&&now<q.expiresAt)||null;
  const completedSq = sqs.find(q=>q.completedAt&&(now-q.completedAt)<86400000)||null;

  // Flags bonus
  const bonusGiven       = state.streakBonusDay===today;
  const weeklyBonusGiven = state.weeklyBonusWk===wk;
  const missedDays       = (()=>{
    if(!state.lastActiveDay)return 0;
    const d=Math.round((new Date(today)-new Date(state.lastActiveDay))/86400000);
    return d>1?d:0;
  })();

  // ─── EFFECTS ──────────────────────────────────────────────────────────

  // Couleur CSS du rang
  useEffect(()=>{
    const r=document.documentElement.style;
    r.setProperty("--rc",rank.color); r.setProperty("--rg",rank.glow);
    r.setProperty("--ra",rank.accent);
  },[rank.id]);

  // Sync streak
  useEffect(()=>{
    if(computedStreak!==state.streak)setState(s=>({...s,streak:computedStreak}));
  },[computedStreak]);

  // Bonus streak + increment streak au moment ou toutes les quetes sont faites
  useEffect(()=>{
    if(!allDailyDone)return;
    setState(s=>{
      const t=todayStr();
      let next={...s};
      if(s.lastStreakDay!==t)next={...next,lastStreakDay:t};
      if(s.streakBonusDay!==t){
        const sx={...next.statXp,Discipline:(next.statXp.Discipline||0)+100};
        next={...next,totalXp:next.totalXp+100,statXp:sx,stats:{...next.stats,Discipline:getLvl(sx.Discipline)},streakBonusDay:t};
      }
      return next;
    });
  },[allDailyDone]);

  // Bonus hebdo
  useEffect(()=>{
    if(!weeklyDone||weeklyBonusGiven)return;
    setState(s=>{
      const sx={...s.statXp,Discipline:(s.statXp.Discipline||0)+150};
      return {...s,totalXp:s.totalXp+150,statXp:sx,stats:{...s.stats,Discipline:getLvl(sx.Discipline)},weeklyBonusWk:wk};
    });
  },[weeklyDone]);

  // Auto-launch quete speciale si aucune active
  useEffect(()=>{
    if(!activeSq&&!completedSq){
      const tpl=pickRandomSq(sqs.map(q=>q.id));
      if(tpl){
        const sq={...tpl,sqid:"sq_"+Date.now(),progress:0,startedAt:Date.now(),expiresAt:Date.now()+tpl.days*86400000,completedAt:null};
        setState(s=>({...s,specialQuests:[...s.specialQuests.filter(q=>q.completedAt),sq]}));
      }
    }
  },[]);

  // ─── ACTIONS ──────────────────────────────────────────────────────────

  function spawnFloat(txt,e){
    const id=Date.now()+Math.random();
    setFloats(f=>[...f,{id,txt}]);
    setTimeout(()=>setFloats(f=>f.filter(p=>p.id!==id)),2300);
  }

  function addXp(amount,stat,e){
    setState(s=>{
      const nt=s.totalXp+amount;
      const sx={...s.statXp,[stat]:(s.statXp[stat]||0)+amount};
      const rk=getRank(s.totalXp), nrk=getNext(rk.id);
      if(nrk&&getRank(nt).id!==rk.id)setTimeout(()=>setRankUp(getRank(nt)),100);
      return {...s,totalXp:nt,statXp:sx,stats:{...s.stats,[stat]:getLvl(sx[stat])},lastActiveDay:todayStr()};
    });
    if(e)spawnFloat("+"+Math.round(amount)+"xp",e);
  }

  function validate(obj,e){
    const raw=(inputs.current[obj.id]||"").toString().replace(",",".");
    const val=parseFloat(raw); if(!val||val<=0)return;
    inputs.current[obj.id]="";
    const cur=obj.weekly?(wLog[obj.id]||0):(tLog[obj.id]||0);
    let xp=0;
    if(obj.binary){const was=cur>=getRankBase(obj.id,ri),now2=(cur+val)>=getRankBase(obj.id,ri); xp=(!was&&now2)?(obj.binaryXp||50):0;}
    else{const nt=cur+val; const b=getRankBase(obj.id,ri); if(cur>=b)xp=val*obj.xpPer*1.5; else if(nt<=b)xp=val*obj.xpPer; else{const n=b-cur; xp=n*obj.xpPer+(val-n)*obj.xpPer*1.5;}}
    setState(s=>{
      if(obj.weekly){const w={...s.weeklyLog};w[wk]={...(w[wk]||{}),[obj.id]:(w[wk]?.[obj.id]||0)+val};return{...s,weeklyLog:w,lastActiveDay:todayStr()};}
      const d={...s.dailyLog};d[today]={...(d[today]||{}),[obj.id]:(d[today]?.[obj.id]||0)+val};return{...s,dailyLog:d,lastActiveDay:todayStr()};
    });
    if(xp>0)addXp(xp,obj.stat,e); else if(obj.binary)spawnFloat("0 XP",e);
  }

  function progressSq(sq,e){
    const el=document.getElementById("sqi_"+sq.sqid); if(!el)return;
    const raw=el.value.toString().replace(",","."); el.value="";
    const val=parseFloat(raw); if(!val||val<=0)return;
    const newProg=Math.min(sq.target,sq.progress+val);
    const wasComplete=sq.progress>=sq.target;
    const nowComplete=newProg>=sq.target;
    if(!wasComplete){
      const xpE=Math.round(sq.xp*((Math.min(val,sq.target-sq.progress))/sq.target));
      if(xpE>0)addXp(xpE,sq.stat,e);
      if(nowComplete)spawnFloat("\uD83C\uDFC6 QUETE URGENTE !",e);
    }
    setState(s=>({...s,specialQuests:s.specialQuests.map(q=>q.sqid===sq.sqid?{...q,progress:newProg,completedAt:(nowComplete&&!wasComplete)?Date.now():q.completedAt}:q)}));
  }

  function launchNewSq(){
    const used=sqs.map(q=>q.id);
    const tpl=pickRandomSq(used); if(!tpl)return;
    const sq={...tpl,sqid:"sq_"+Date.now(),progress:0,startedAt:Date.now(),expiresAt:Date.now()+tpl.days*86400000,completedAt:null};
    setState(s=>({...s,specialQuests:[...s.specialQuests.filter(q=>q.completedAt),sq]}));
  }

  function fmtCD(ms){
    const d=Math.floor(ms/86400000),hh=Math.floor((ms%86400000)/3600000),mm=Math.floor((ms%3600000)/60000);
    if(d>0)return d+"j "+hh+"h"; if(hh>0)return hh+"h "+mm+"min"; return mm+"min";
  }

  // ─── SOUS-COMPOSANTS ──────────────────────────────────────────────────

  function QI({obj}){
    const t=getRankBase(obj.id,ri), d=obj.weekly?(wLog[obj.id]||0):(tLog[obj.id]||0);
    const done=d>=1;

    // Quêtes binaires : boutons Échec / Succès
    if(obj.binary){
      function setBinary(val,e){
        const cur=obj.weekly?(wLog[obj.id]||0):(tLog[obj.id]||0);
        const wasD=cur>=1;
        const xp=(!wasD&&val>=1)?obj.binaryXp:0;
        const cx=e?e.clientX:200, cy=e?e.clientY:300;
        setState(s=>{
          const d2={...s.dailyLog};
          d2[today]={...(d2[today]||{}),[obj.id]:val};
          return {...s,dailyLog:d2,lastActiveDay:todayStr()};
        });
        if(xp>0){
          const id=Date.now()+Math.random();
          setFloats(f=>[...f,{id,x:cx,y:cy,txt:"+"+xp+"xp"}]);
          setTimeout(()=>setFloats(f=>f.filter(p=>p.id!==id)),1300);
          setState(s=>{
            const sx={...s.statXp,[obj.stat]:(s.statXp[obj.stat]||0)+xp};
            const st={...s.stats,[obj.stat]:getLvl(sx[obj.stat])};
            return {...s,totalXp:s.totalXp+xp,statXp:sx,stats:st,lastActiveDay:todayStr()};
          });
        }
      }
      return h("div",{class:"qi "+(done?"done":"")},
        h("div",{class:"qhdr"},
          h("div",{class:"qname"},h("span",null,obj.icon)," ",obj.name),
          h("div",{style:"display:flex;gap:4px"},
            h("button",{class:"delbtn",onClick:()=>setEditObj({...obj})},"\u270F\uFE0F"),
            h("button",{class:"delbtn",onClick:()=>setConfirmDelete(obj.id)},"\uD83D\uDDD1")
          )
        ),
        h("div",{style:"display:flex;gap:8px;margin-top:4px"},
          h("button",{
            onClick:e=>setBinary(0,e),
            style:"flex:1;padding:10px;border-radius:8px;border:1px solid "+(d===0&&d!==undefined&&tLog[obj.id]!==undefined?"#ef4444":"#ef444444")+";background:"+(d===0&&tLog[obj.id]!==undefined?"#ef444422":"rgba(255,255,255,0.03)")+";color:#ef4444;font-family:Orbitron,sans-serif;font-size:11px;cursor:pointer;letter-spacing:1px"
          },"\u274C \u00c9chec"),
          h("button",{
            onClick:e=>setBinary(1,e),
            style:"flex:1;padding:10px;border-radius:8px;border:1px solid "+(done?"#4ade80":"#4ade8044")+";background:"+(done?"#4ade8022":"rgba(255,255,255,0.03)")+";color:#4ade80;font-family:Orbitron,sans-serif;font-size:11px;cursor:pointer;letter-spacing:1px"
          },"\u2705 Succ\u00e8s")
        ),
        h("div",{style:"font-size:10px;color:var(--td);margin-top:6px;font-family:Orbitron,sans-serif"},
          obj.binaryXp+" XP si succ\u00e8s \u00b7 "+(STAT_LBL[obj.stat]||obj.stat)
        )
      );
    }

    const pct=(d/t)*100, over=d>t;
    return h("div",{class:"qi "+(done?"done":"")},
      h("div",{class:"qhdr"},
        h("div",{class:"qname"},h("span",null,obj.icon)," ",obj.name),
        h("div",{style:"display:flex;gap:4px"},
          h("button",{class:"delbtn",onClick:()=>setEditObj({...obj})},"\u270F\uFE0F"),
          h("button",{class:"delbtn",onClick:()=>setConfirmDelete(obj.id)},"\uD83D\uDDD1")
        )
      ),
      h("div",{class:"qrow"},
        h("div",{class:"qbar"},h("div",{class:"qfill"+(over?" over":done?" done":""),style:"width:"+Math.min(100,pct)+"%"})),
        h("div",{class:"qxp"},d+"/"+t+" "+obj.unit)
      ),
      h("div",{class:"qinrow"},
        h("input",{class:"qin",type:"text",inputMode:"decimal",placeholder:"+ "+obj.unit,id:"qi_"+obj.id,onInput:ev=>{inputs.current[obj.id]=ev.target.value;}}),
        h("button",{class:"qbtn",onClick:e=>{
          const el=document.getElementById("qi_"+obj.id);
          if(el)inputs.current[obj.id]=el.value;
          validate(obj,e);
          if(el)el.value="";
        }},"+XP")
      ),
      h("div",{style:"font-size:10px;color:var(--td);margin-top:4px;font-family:Orbitron,sans-serif"},
        obj.xpPer+" xp/"+obj.unit+" \u00b7 "+(STAT_LBL[obj.stat]||obj.stat)
      )
    );
  }

  function RR({obj,isW}){
    const t=getRankBase(obj.id,ri), d=isW?(wLog[obj.id]||0):(tLog[obj.id]||0);
    const pct=Math.min(100,(d/t)*100), done=d>=t, over=d>t;
    return h("div",{style:"display:flex;align-items:center;gap:10px;margin-bottom:8px"},
      h("span",{style:"font-size:16px"},obj.icon),
      h("div",{style:"flex:1"},
        h("div",{style:"font-size:12px;color:"+(over?"#f59e0b":done?"var(--rc)":"var(--tx)")+";margin-bottom:3px;display:flex;justify-content:space-between"},
          h("span",null,obj.name),
          h("span",{style:"font-family:Orbitron,sans-serif;font-size:10px"},d+"/"+t+" "+obj.unit)
        ),
        h("div",{class:"qbar"},h("div",{class:"qfill"+(over?" over":done?" done":""),style:"width:"+pct+"%;opacity:"+(done||over?1:0.7)}))
      ),
      done&&h("span",{style:"font-size:22px"},"✅")
    );
  }

  function SqCard({sq,showInput}){
    const remaining=sq.expiresAt-now;
    const urgent=remaining<86400000&&!sq.completedAt;
    const pct=Math.min(100,(sq.progress/sq.target)*100);
    return h("div",{class:"sqcard"+(urgent?" sq-urgent":"")},
      h("div",{style:"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px"},
        h("div",{style:"display:flex;align-items:center;gap:8px"},
          h("span",{style:"font-size:18px"},sq.icon),
          h("div",null,
            h("div",{style:"font-size:13px;font-weight:700;color:var(--tx)"},sq.name),
            h("div",{style:"font-size:10px;color:var(--td);margin-top:1px"},sq.desc)
          )
        ),
        h("div",{style:"text-align:right"},
          h("div",{style:"font-family:Orbitron,sans-serif;font-size:11px;color:"+(urgent?"#ef4444":"#ef4444bb")},fmtCD(remaining)),
          h("div",{style:"font-size:9px;color:var(--td)"},"restants")
        )
      ),
      h("div",{class:"sqbar"},h("div",{class:"sqbarfill",style:"width:"+pct+"%"})),
      h("div",{style:"display:flex;justify-content:space-between;font-size:10px;color:var(--td)"},
        h("span",null,sq.progress+"/"+sq.target+" "+sq.unit),
        h("span",{style:"color:#ef4444;font-family:Orbitron,sans-serif"},"+"+sq.xp+" XP \u00b7 "+(STAT_LBL[sq.stat]||sq.stat))
      ),
      showInput&&h("div",{class:"qinrow",style:"margin-top:8px"},
        h("input",{id:"sqi_"+sq.sqid,class:"qin",type:"text",inputMode:"decimal",placeholder:"+ "+sq.unit,style:"border-color:#ef444466"}),
        h("button",{class:"qbtn",style:"border-color:#ef444466;color:#ef4444",onClick:e=>progressSq(sq,e)},"+XP")
      )
    );
  }

  // ─── ONGLET ACCUEIL ───────────────────────────────────────────────────

  function Home(){
    const secs=[
      {lb:"\u2694 Qu\u00eates journali\u00e8res",ob:sortStat(objs.filter(o=>o.daily&&!o.optional)),iw:false},
      {lb:"\u2728 Qu\u00eates bonus",            ob:sortStat(objs.filter(o=>o.daily&&o.optional)), iw:false},
      {lb:"\uD83D\uDCC5 Qu\u00eates hebdomadaires",ob:sortStat(objs.filter(o=>o.weekly)),          iw:true},
    ];
    return h("div",{class:"tab"},
      missedDays>=2&&h("div",{class:"warn"},"\u26A0\uFE0F P\u00e9nalit\u00e9 : -"+(missedDays*10)+" XP ("+missedDays+" jours manqu\u00e9s)"),
      nextRank&&h("div",{class:"card"},
        h("div",{style:"display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;margin-bottom:12px"},
          h("div",{style:"display:flex;align-items:center;gap:10px"},
            h("div",{style:"font-family:Orbitron,sans-serif;font-size:36px;font-weight:900;color:var(--rc);text-shadow:0 0 20px var(--rg);line-height:1"},rank.id),
            h("div",null,
              h("div",{style:"font-family:Orbitron,sans-serif;font-size:13px;font-weight:700;color:var(--rc)"},rank.label),
              h("div",{style:"font-size:10px;color:var(--td);letter-spacing:1px;text-transform:uppercase;margin-top:2px"},"Rang actuel")
            )
          ),
          h("div",{style:"font-size:18px;color:var(--td);text-align:center"},"\u2192"),
          h("div",{style:"text-align:right"},
            h("div",{style:"font-family:Orbitron,sans-serif;font-size:22px;font-weight:700;color:var(--td);line-height:1"},nextRank.id),
            h("div",{style:"font-size:10px;color:var(--td);letter-spacing:1px;text-transform:uppercase;margin-top:2px"},nextRank.label)
          )
        ),
        h("div",{class:"xpbar",style:"height:8px"},h("div",{class:"xpfill",style:"width:"+rankPct+"%"})),
        h("div",{style:"display:flex;justify-content:space-between;font-size:10px;color:var(--td);margin-top:5px;font-family:Orbitron,sans-serif"},

                h("div",{style:"font-size:13px;color:#ef4444;margin-bottom:12px;text-align:center"},"\u26A0\uFE0F Action irr\u00e9versible. Toute ta progression sera perdue."),
                h("div",{class:"mrow"},
                  h("button",{class:"mbtn mdng",style:"flex:1",onClick:()=>{localStorage.removeItem("sl_v3");setState({...IMPORTED,totalXp:0,streak:0,statXp:{Vitalite:0,Force:0,Esprit:0,Endurance:0,Discipline:0},stats:{Vitalite:0,Force:0,Esprit:0,Endurance:0,Discipline:0},dailyLog:{},weeklyLog:{},specialQuests:[]});setConfirmReset(false);setShowSet(false);}},"\u2705 Confirmer"),
                  h("button",{class:"mbtn mcan",style:"flex:1",onClick:()=>setConfirmReset(false)},"Annuler")
                )
              )
        )
      )
    );
  }

  // ─── MODAL EDITION QUETE ──────────────────────────────────────────────

  function EditModal(){
    if(!editObj)return null;
    const id="em_"+editObj.id;
    function save(){
      const g=f=>document.getElementById(id+"_"+f)?.value;
      const name=g("name")||editObj.name, icon=g("icon")||editObj.icon, unit=g("unit")||editObj.unit;
      const xpPer=parseFloat(g("xper"))||editObj.xpPer, base=parseInt(g("base"))||editObj.base;
      const optional=document.getElementById(id+"_opt")?.checked??editObj.optional;
      const weekly=document.getElementById(id+"_wkly")?.checked??editObj.weekly;
      const stat=document.getElementById(id+"_stat")?.value||editObj.stat;
      setState(s=>({...s,objectives:(s.objectives||DEFS).map(o=>o.id===editObj.id?{...o,name,icon,unit,xpPer,base,optional,weekly,daily:!weekly,stat}:o)}));
      setEditObj(null);
    }
    return h("div",{class:"modal-ov",onClick:e=>{if(e.target===e.currentTarget)setEditObj(null);}},
      h("div",{class:"modal"},
        h("div",{class:"mtitle"},"\u270F\uFE0F Modifier la qu\u00eate"),
        h("div",{class:"fg",style:"display:grid;grid-template-columns:1fr 1fr;gap:8px"},
          h("input",{id:id+"_name",class:"fin ff",placeholder:"Nom",defaultValue:editObj.name}),
          h("input",{id:id+"_icon",class:"fin",placeholder:"Ic\u00f4ne",defaultValue:editObj.icon}),
          h("input",{id:id+"_unit",class:"fin",placeholder:"Unit\u00e9",defaultValue:editObj.unit}),
          h("input",{id:id+"_xper",class:"fin",type:"text",inputMode:"decimal",placeholder:"XP/unit\u00e9",defaultValue:editObj.xpPer}),
          h("input",{id:id+"_base",class:"fin",type:"text",inputMode:"decimal",placeholder:"Objectif",defaultValue:editObj.base}),
          h("select",{id:id+"_stat",class:"fsel ff"},STATS.map(s=>h("option",{key:s,value:s,selected:s===editObj.stat},STAT_LBL[s]||s))),
          h("label",{class:"fck"},h("input",{id:id+"_opt",type:"checkbox",defaultChecked:editObj.optional}),"Bonus"),
          h("label",{class:"fck"},h("input",{id:id+"_wkly",type:"checkbox",defaultChecked:editObj.weekly}),"Hebdo")
        ),
        h("div",{class:"mrow",style:"margin-top:16px"},
          h("button",{class:"mbtn mprim",style:"flex:2",onClick:save},"\u2705 Sauvegarder"),
          h("button",{class:"mbtn mcan",style:"flex:1",onClick:()=>setEditObj(null)},"Annuler")
        )
      )
    );
  }

  // ─── ANIMATION RANK UP ────────────────────────────────────────────────

  function RankUp(){
    if(!rankUp)return null;
    const lines=Array.from({length:12},(_,i)=>({t:Math.random()*100+"%",l:Math.random()*100+"%",a:(Math.random()-.5)*40+"deg",d:Math.random()*1.5+"s"}));
    return h("div",{class:"ruov",style:"--rc:"+rankUp.color+";--rg:"+rankUp.glow},
      h("div",{class:"rulines"},lines.map((l,i)=>h("div",{key:i,class:"ruline",style:"top:"+l.t+";left:"+l.l+";--ang:"+l.a+";animation-delay:"+l.d}))),
      h("div",{class:"rucont"},
        h("div",{class:"rutitle"},"Rang atteint"),
        h("div",{class:"rurank"},rankUp.id),
        h("div",{class:"rulabel"},rankUp.label),
        h("button",{class:"rudis",onClick:()=>setRankUp(null)},"Continuer")
      )
    );
  }

  // ─── RENDU PRINCIPAL ──────────────────────────────────────────────────

  const parts=Array.from({length:15},(_,i)=>({id:i,s:Math.random()*3+1,l:Math.random()*100,dur:Math.random()*10+8,del:Math.random()*10}));

  return h(Fragment,null,
    h("div",{id:"app"},
      h("div",{class:"particles"},parts.map(p=>h("div",{key:p.id,class:"particle",style:"width:"+p.s+"px;height:"+p.s+"px;left:"+p.l+"%;bottom:-10px;background:"+rank.color+";box-shadow:0 0 4px "+rank.glow+";animation-duration:"+p.dur+"s;animation-delay:"+p.del+"s"}))),
      h("div",{class:"hdr"},
        h("div",{class:"hdr-top"},
          h("div",null,h("div",{class:"pname"},"VAL")),
          h("button",{class:"gbtn",onClick:()=>setShowSet(true)},"\u2699")
        )
      ),
      tab==="home"    &&h(Home,null),
      tab==="quests"  &&h(Quests,null),
      tab==="stats"   &&h(Stats,null),
      tab==="history" &&h(History,null),
      h("nav",{class:"nav"},
        [["home","\uD83C\uDFE0","Accueil"],["quests","\u2694","Qu\u00eates"],["stats","\uD83D\uDCCA","Stats"],["history","\uD83D\uDCC5","Historique"]].map(([id,icon,lbl])=>
          h("button",{key:id,class:"nbtn "+(tab===id?"on":""),style:tab===id?"border:1px solid "+rank.color+"88;border-radius:10px;margin:6px 4px;padding:8px 0":"margin:6px 4px;padding:8px 0",onClick:()=>setTab(id)},
            h("span",{class:"nicon"},icon),lbl)
        )
      ),
      floats.map(f=>h("div",{key:f.id,class:"xpfloat",style:"top:40%"},f.txt)),
      h(EditModal,null),
      h(Settings,null),
      h(RankUp,null),
      confirmDelete&&h("div",{class:"modal-ov",style:"align-items:center",onClick:()=>setConfirmDelete(null)},
        h("div",{class:"modal",style:"border-radius:12px;max-width:320px;width:90%"},
          h("div",{class:"mtitle"},"\uD83D\uDDD1 Supprimer la qu\u00eate"),
          h("div",{style:"font-size:13px;color:#ef4444;text-align:center;margin-bottom:16px"},
            "\u26A0\uFE0F Supprimer ",h("strong",null,(objs.find(o=>o.id===confirmDelete)||{}).name||"cette qu\u00eate")," ?"
          ),
          h("div",{class:"mrow"},
            h("button",{class:"mbtn mdng",style:"flex:1",onClick:()=>{setState(s=>({...s,objectives:(s.objectives||DEFS).filter(o=>o.id!==confirmDelete)}));setConfirmDelete(null);}},"\u2705 Confirmer"),
            h("button",{class:"mbtn mcan",style:"flex:1",onClick:()=>setConfirmDelete(null)},"Annuler")
          )
        )
      )
    )
  );
}

render(h(App,null),document.getElementById("app"));
</script>
</body>
</html>
