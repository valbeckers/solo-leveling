<script>
const { h, render, Fragment } = preact;
const { useState, useEffect, useRef } = preactHooks;

// Rangs avec progression x2
const RANKS = [
  {id:"E",label:"Eveille",   color:"#9ca3af",glow:"#9ca3af55",bg:"#0a0a0f",accent:"#6b7280",xpRequired:0},

const STATS = ["Vitalite","Force","Esprit","Endurance","Discipline"];

const STAT_COLORS = {Vitalite:"#ef4444",Force:"#4ade80",Esprit:"#f59e0b",Endurance:"#22d3ee",Discipline:"#c084fc"};
const STAT_LABELS = {Vitalite:"Vitalit\u00e9",Force:"Force",Esprit:"Esprit",Endurance:"Endurance",Discipline:"Discipline"};

const E = {
  push:"\uD83E\uDDBE", abs:"\uD83E\uDDCE\uD83C\uDFFB\u200D\u2642\uFE0F",
  squats:"\uD83E\uDDBF", water:"\uD83D\uDCA7", reading:"\uD83D\uDCDA",
  run:"\uD83C\uDFC3\uD83C\uDFFB", med:"\uD83E\uDDD8\uD83C\uDFFB",
  flex:"\uD83E\uDD38\uD83C\uDFFB", sleep:"\uD83D\uDECF\uFE0F",

const DEFS = [
  {id:"push",   name:"Pompes",      unit:"reps",  xpPer:1,  daily:true, weekly:false,optional:false,stat:"Force",    icon:E.push,   base:30},
  {id:"abs",    name:"Abdominaux",  unit:"reps",  xpPer:1,  daily:true, weekly:false,optional:false,stat:"Force",    icon:E.abs,    base:60},

  {id:"water",  name:"Hydratation", unit:"verres",xpPer:5,  daily:true, weekly:false,optional:false,stat:"Vitalite", icon:E.water,  base:8},
  {id:"reading",name:"Lecture",     unit:"pages", xpPer:5,  daily:true, weekly:false,optional:false,stat:"Esprit",   icon:E.reading,base:10},
  {id:"run",    name:"Course",      unit:"km",    xpPer:25, daily:false,weekly:true, optional:false,stat:"Endurance",icon:E.run,    base:7},

  {id:"flex",   name:"Souplesse",   unit:"min",   xpPer:5,  daily:true, weekly:false,optional:true, stat:"Vitalite", icon:E.flex,   base:5},

// 20 quêtes spéciales - 5 par stat - 1/4 chance par stat = 1/20 par quête
const SP = {
  Force:[
    {id:"sp_dips",   name:"Dips",              icon:"\uD83D\uDCAA",unit:"reps",  target:50,  xp:300,days:7, desc:"50 dips en 7 jours"},
    {id:"sp_pull",   name:"Tractions",          icon:"\uD83C\uDFCB\uFE0F",unit:"reps",target:30,xp:300,days:7,desc:"30 tractions en 7 jours"},
    {id:"sp_lunge",  name:"Fentes march\u00e9es",icon:"\uD83E\uDDB5",unit:"pas", target:200, xp:200,days:3, desc:"200 pas de fentes en 3 jours"},
    {id:"sp_plank",  name:"Gainage",            icon:"\uD83D\uDCAA",unit:"min",  target:10,  xp:150,days:3, desc:"10 min cumul\u00e9es en 3 jours"},
    {id:"sp_200push",name:"200 pompes",         icon:E.push,        unit:"reps", target:200, xp:350,days:5, desc:"200 pompes en une s\u00e9ance"},
  ],
  Esprit:[
    {id:"sp_pod",    name:"Podcast",            icon:"\uD83C\uDF99\uFE0F",unit:"\u00e9p.",target:1,xp:100,days:3,desc:"1 podcast complet en 3 jours"},
    {id:"sp_50p",    name:"50 pages",           icon:E.reading,     unit:"pages",target:50,  xp:250,days:3, desc:"50 pages en une journ\u00e9e"},
    {id:"sp_med30",  name:"M\u00e9ditation 30min",icon:E.med,       unit:"min",  target:30,  xp:200,days:5, desc:"30 min en une s\u00e9ance"},
    {id:"sp_learn",  name:"Apprentissage",      icon:"\uD83E\uDDE0",unit:"s\u00e9ances",target:3,xp:200,days:5,desc:"3 s\u00e9ances d'apprentissage"},
    {id:"sp_write",  name:"Journaling",         icon:"\u270D\uFE0F",unit:"mots", target:500, xp:150,days:3, desc:"500 mots \u00e9crits en 3 jours"},
  ],
  Endurance:[
    {id:"sp_jump",   name:"Corde \u00e0 sauter",icon:"\uD83E\uDE62",unit:"min",  target:20,  xp:250,days:3, desc:"20 min non-stop"},
    {id:"sp_sprint", name:"Sprints",            icon:"\u26A1",       unit:"s\u00e9ries",target:10,xp:300,days:3,desc:"10 x 100m sprint/r\u00e9cup"},
    {id:"sp_5km",    name:"5km d'une traite",   icon:E.run,         unit:"km",   target:5,   xp:300,days:7, desc:"5km sans s'arr\u00eater"},
    {id:"sp_5sess",  name:"5 s\u00e9ances cardio",icon:"\uD83D\uDD25",unit:"s\u00e9ances",target:5,xp:350,days:7,desc:"5 s\u00e9ances cardio en 7 jours"},
    {id:"sp_30cardio",name:"30 min cardio",     icon:"\uD83E\uDE96",unit:"min",  target:30,  xp:300,days:5, desc:"30 min cardio non-stop"},
  ],
  Vitalite:[
    {id:"sp_nosg",   name:"Sans sucre",         icon:"\uD83E\uDD57",unit:"jours",target:5,   xp:300,days:5, desc:"5 jours sans junk food"},
    {id:"sp_flex30", name:"Souplesse 30min",    icon:E.flex,        unit:"min",  target:30,  xp:150,days:3, desc:"30 min de souplesse en une s\u00e9ance"},
    {id:"sp_sleep22",name:"Coucher t\u00f4t",   icon:E.sleep,       unit:"nuits",target:3,   xp:200,days:5, desc:"Dormir avant 22h30 \u2014 3 nuits"},
    {id:"sp_fasting",name:"Je\u00fbne 16h",     icon:"\u23F3",       unit:"fois", target:3,   xp:300,days:7, desc:"Je\u00fbne 16h \u2014 3 fois en 7 jours"},
    {id:"sp_fruits", name:"5 fruits/l\u00e9gumes",icon:"\uD83E\uDD57",unit:"jours",target:4, xp:250,days:5, desc:"5 fruits/l\u00e9gumes/jour \u2014 4 jours"},
  ],
};

// Probabilités : 1/4 par stat, 1/20 par quête
function pickRandomSp(usedIds){
  const stats=["Force","Esprit","Endurance","Vitalite"];
  const stat=stats[Math.floor(Math.random()*4)];
  const avail=SP[stat].filter(t=>!usedIds.includes(t.id));
  if(avail.length===0){
    // fallback : autre stat
    const others=stats.filter(s=>s!==stat);
    for(const s of others){
      const a=SP[s].filter(t=>!usedIds.includes(t.id));
      if(a.length>0)return {...a[Math.floor(Math.random()*a.length)],stat:s};
    }
    return null;
  }
  return {...avail[Math.floor(Math.random()*avail.length)],stat};
}

const IMPORTED = {
  totalXp:2510.5, streak:3, lastActiveDay:"2026-04-09",
  streakBonusDay:"2026-04-09", weeklyBonusWk:"2026-W15",
  dailyLog:{
    "2026-04-06":{water:8,push:36,abs:72,sleep:8},
    "2026-04-07":{water:8,push:36,abs:72,squats:15,reading:11,flex:5,sleep:8,med:6},
    "2026-04-08":{water:11,push:100,abs:115,squats:35,reading:48,sleep:8,med:6,flex:20},
    "2026-04-09":{water:2,sleep:8,push:41,abs:64,squats:16}
  },
  weeklyLog:{"2026-W15":{run:10}},
  stats:{Vitalite:4,Force:5,Esprit:3,Endurance:2,Discipline:4},
  statXp:{Vitalite:515,Force:700.5,Esprit:457.5,Endurance:287.5,Discipline:550},
  specialQuests:[]
};

const getRank   = xp => { for(let i=RANKS.length-1;i>=0;i--)if(xp>=RANKS[i].xpRequired)return RANKS[i];return RANKS[0]; };
const getNext   = id => { const i=RANKS.findIndex(r=>r.id===id);return i<RANKS.length-1?RANKS[i+1]:null; };
const getTarget = (base,ri) => Math.round(base*Math.pow(1.25,ri));
const todayStr  = () => new Date().toISOString().slice(0,10);
const wkStr     = (d=new Date()) => { const j=new Date(d.getFullYear(),0,1);return d.getFullYear()+"-W"+Math.ceil(((d-j)/86400000+j.getDay()+1)/7); };
const sortStat  = arr => [...arr].sort((a,b)=>STAT_ORDER.indexOf(a.stat)-STAT_ORDER.indexOf(b.stat));
const xpForLvl  = l => Math.round(100*Math.pow(1.1,l));
const totForLvl = l => { let t=0;for(let i=0;i<l;i++)t+=xpForLvl(i);return t; };
const getLvl    = xp => { let l=0;while(xp>=totForLvl(l+1))l++;return l; };

function calcXp(obj,total,ri){
  if(total<=0)return 0;
  if(obj.binary){const t=getTarget(obj.base,ri);return total>=t?(obj.binaryXp||50):0;}
  const t=getTarget(obj.base,ri);
  if(total<=t)return total*obj.xpPer;
  return t*obj.xpPer+(total-t)*obj.xpPer*1.5;
}

const loadState = () => {try{const r=localStorage.getItem("sl_v3");return r?JSON.parse(r):null;}catch{return null;}};
const saveState = s => {try{localStorage.setItem("sl_v3",JSON.stringify(s));}catch{}};

function buildFromImported(){ return {...IMPORTED,objectives:DEFS}; }
function emptyState(){
  return {totalXp:0,streak:0,lastActiveDay:null,streakBonusDay:null,weeklyBonusWk:null,
    objectives:DEFS,dailyLog:{},weeklyLog:{},specialQuests:[],
    stats:{Vitalite:0,Force:0,Esprit:0,Endurance:0,Discipline:0},
    statXp:{Vitalite:0,Force:0,Esprit:0,Endurance:0,Discipline:0}};
}

function migrate(saved){
  const P={push:{icon:E.push,stat:"Force",xpPer:1},abs:{icon:E.abs,stat:"Force",xpPer:1},
    squats:{icon:E.squats,stat:"Force",xpPer:1},water:{icon:E.water,stat:"Vitalite",xpPer:5},
    reading:{icon:E.reading,stat:"Esprit",xpPer:5},run:{icon:E.run,stat:"Endurance",xpPer:25},
    med:{icon:E.med,stat:"Esprit",xpPer:5},flex:{icon:E.flex,stat:"Vitalite",xpPer:5}};
  let objs=(saved.objectives||DEFS).map(o=>P[o.id]?{...o,...P[o.id]}:o);
  if(!objs.find(o=>o.id==="sleep"))objs=[...objs,DEFS.find(o=>o.id==="sleep")];
  objs=objs.map(o=>o.id==="sleep"?{...o,binaryXp:50}:o);
  const fixK=k=>({"\u0056italit\u00e9":"Vitalite","Vitalit\u00e9":"Vitalite","Intelligence":"Esprit","Agilit\u00e9":"_del","Agility":"_del"}[k]||k);
  const stats={};Object.entries(saved.stats||{}).forEach(([k,v])=>{const nk=fixK(k);if(STATS.includes(nk))stats[nk]=v;});
  STATS.forEach(s=>{if(stats[s]===undefined)stats[s]=0;});
  const statXp={};Object.entries(saved.statXp||{}).forEach(([k,v])=>{const nk=fixK(k);if(STATS.includes(nk))statXp[nk]=v;});
  STATS.forEach(s=>{if(statXp[s]===undefined)statXp[s]=0;});
  return {...saved,objectives:objs,stats,statXp,specialQuests:saved.specialQuests||[]};
}

function App(){
  const [state,setState]=useState(()=>{const s=loadState();return s?migrate(s):buildFromImported();});
  const [tab,setTab]=useState("home");
  const [showAdd,setShowAdd]=useState(false);
  const [rankUp,setRankUp]=useState(null);
  const [floats,setFloats]=useState([]);
  const inputs=useRef({});
  const [newObj,setNewObj]=useState({name:"",unit:"reps",xpPer:1,daily:true,weekly:false,optional:false,stat:"Force",icon:"\u26A1",base:10});
  const [editObj,setEditObj]=useState(null);
  const [showSet,setShowSet]=useState(false);
  const [confirmReset,setConfirmReset]=useState(false);
  const [confirmDelete,setConfirmDelete]=useState(null);
  const [wkOff,setWkOff]=useState(0);

  useEffect(()=>{saveState(state);},[state]);

  const rank=getRank(state.totalXp);
  useEffect(()=>{
    const r=document.documentElement.style;
    r.setProperty("--rc",rank.color);r.setProperty("--rg",rank.glow);
    r.setProperty("--ra",rank.accent);r.setProperty("--bg",rank.bg);
  },[rank.id]);

  useEffect(()=>{
    const t=todayStr();
    if(state.lastActiveDay&&state.lastActiveDay!==t){
      const diff=Math.round((new Date(t)-new Date(state.lastActiveDay))/86400000);
      if(diff>=2)setState(s=>({...s,totalXp:Math.max(0,s.totalXp-diff*10),streak:0}));
    }
  },[]);

  const today=todayStr(),wk=wkStr();
  const ri=RANKS.findIndex(r=>r.id===rank.id);
  const nextRank=getNext(rank.id);
  const xpInRank=state.totalXp-rank.xpRequired;
  const xpToNext=nextRank?nextRank.xpRequired-rank.xpRequired:1;
  const rankPct=nextRank?Math.min(100,(xpInRank/xpToNext)*100):100;
  const tLog=state.dailyLog[today]||{},wLog=state.weeklyLog[wk]||{};
  const todayXp=Object.entries(tLog).reduce((s,[id,a])=>{const o=state.objectives.find(x=>x.id===id);return s+(o?calcXp(o,a,ri):0);},0)
    +Object.entries(wLog).reduce((s,[id,a])=>{const o=state.objectives.find(x=>x.id===id&&x.weekly);return s+(o?calcXp(o,a,ri):0);},0);

  const allDailyReqDone=state.objectives.filter(o=>!o.optional&&o.daily).every(o=>(tLog[o.id]||0)>=getTarget(o.base,ri));

  // Bonus hebdo = quête hebdo atteinte + toutes les journalières complétées 7 jours cette semaine
  const weeklyReqDone=(()=>{
    // 1. Quête hebdo atteinte
    const weeklyOk=state.objectives.filter(o=>!o.optional&&o.weekly).every(o=>(wLog[o.id]||0)>=getTarget(o.base,ri));
    if(!weeklyOk)return false;
    // 2. Calculer les jours de la semaine en cours
    const ws=new Date();ws.setDate(ws.getDate()-((ws.getDay()+6)%7));ws.setHours(0,0,0,0);
    const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(ws.getDate()+i);return d.toISOString().slice(0,10);});
    const pastDays=weekDays.filter(d=>d<=today);
    // 3. Pour chaque quête journalière obligatoire, vérifier qu'elle a été faite chaque jour passé de la semaine
    const dailyReqObjs=state.objectives.filter(o=>!o.optional&&o.daily);
    return dailyReqObjs.every(o=>
      pastDays.every(d=>(state.dailyLog[d]?.[o.id]||0)>=getTarget(o.base,ri))
    );
  })();
  const bonusGiven=state.streakBonusDay===today;
  const weeklyBonusGiven=state.weeklyBonusWk===wk;
  const missedDays=(()=>{if(!state.lastActiveDay)return 0;const d=Math.round((new Date(today)-new Date(state.lastActiveDay))/86400000);return d>1?d:0;})();

  // Quête spéciale active
  const now=Date.now();
  const sqs=state.specialQuests||[];
  const activeSq=sqs.find(q=>!q.completedAt&&now<q.expiresAt)||null;
  const completedSq=sqs.find(q=>q.completedAt&&(now-q.completedAt)<86400000)||null;

  // Auto-launch quête spéciale si aucune active
  useEffect(()=>{
    if(!activeSq&&!completedSq){
      const used=sqs.map(q=>q.id);
      const tpl=pickRandomSp(used);
      if(tpl){
        const sq={...tpl,sqid:"sq_"+Date.now(),progress:0,startedAt:Date.now(),expiresAt:Date.now()+tpl.days*86400000,completedAt:null};
        setState(s=>({...s,specialQuests:[...s.specialQuests.filter(q=>q.completedAt),sq]}));
      }
    }
  },[activeSq,completedSq]);

  function spawnFloat(txt,e){
    const id=Date.now()+Math.random(),x=e?e.clientX:200,y=e?e.clientY:300;
    setFloats(f=>[...f,{id,x,y,txt}]);
    setTimeout(()=>setFloats(f=>f.filter(p=>p.id!==id)),1300);
  }

  function addXpFn(amount,stat,e){
    setState(s=>{
      const nt=s.totalXp+amount;
      const sx={...s.statXp,[stat]:(s.statXp[stat]||0)+amount};
      const st={...s.stats,[stat]:getLvl(sx[stat])};
      if(getRank(nt).id!==getRank(s.totalXp).id)setTimeout(()=>setRankUp(getRank(nt)),100);
      return {...s,totalXp:nt,statXp:sx,stats:st,lastActiveDay:todayStr()};
    });
    if(e)spawnFloat("+"+Math.round(amount)+"xp",e);
  }

  useEffect(()=>{
    if(allDailyReqDone&&!bonusGiven&&state.streak>0){
      setState(s=>({...s,streakBonusDay:today}));
      addXpFn(100,"Discipline",null);
    }
  },[allDailyReqDone]);

  useEffect(()=>{
    if(weeklyReqDone&&!weeklyBonusGiven){
      setState(s=>({...s,weeklyBonusWk:wk}));
      addXpFn(150,"Discipline",null);
    }
  },[weeklyReqDone]);

  function validate(obj,e){
    const raw=(inputs.current[obj.id]||"").toString().replace(",",".");
    const val=parseFloat(raw);if(!val||val<=0)return;
    inputs.current[obj.id]="";
    const cur=obj.weekly?(wLog[obj.id]||0):(tLog[obj.id]||0);
    const tgt=getTarget(obj.base,ri);
    let xp=0;
    if(obj.binary){const was=cur>=tgt,now2=(cur+val)>=tgt;xp=(!was&&now2)?(obj.binaryXp||50):0;}
    else{const nt=cur+val;if(cur>=tgt)xp=val*obj.xpPer*1.5;else if(nt<=tgt)xp=val*obj.xpPer;else{const n=tgt-cur;xp=n*obj.xpPer+(val-n)*obj.xpPer*1.5;}}
    setState(s=>{
      if(obj.weekly){const w={...s.weeklyLog};w[wk]={...(w[wk]||{}),[obj.id]:(w[wk]?.[obj.id]||0)+val};return{...s,weeklyLog:w,lastActiveDay:todayStr()};}
      const d={...s.dailyLog};d[today]={...(d[today]||{}),[obj.id]:(d[today]?.[obj.id]||0)+val};return{...s,dailyLog:d,lastActiveDay:todayStr()};
    });
    if(xp>0)addXpFn(xp,obj.stat,e);else if(obj.binary)spawnFloat("0 XP",e);
  }

  function progressSq(sq,e){
    const el=document.getElementById("sqi_"+sq.sqid);
    if(!el)return;
    const raw=el.value.toString().replace(",",".");
    const val=parseFloat(raw);if(!val||val<=0)return;
    el.value="";
    const newProg=Math.min(sq.target,sq.progress+val);
    const wasComplete=sq.progress>=sq.target;
    const nowComplete=newProg>=sq.target;
    if(!wasComplete){
      const xpE=Math.round(sq.xp*(Math.min(val,sq.target-sq.progress)/sq.target));
      if(xpE>0)addXpFn(xpE,sq.stat,e);
      if(nowComplete)spawnFloat("\uD83C\uDFC6 QUETE SPECIALE !",e);
    }
    setState(s=>({...s,specialQuests:s.specialQuests.map(q=>q.sqid===sq.sqid
      ?{...q,progress:newProg,completedAt:(nowComplete&&!wasComplete)?Date.now():q.completedAt}:q)}));
  }

  function launchNewSq(){
    const used=sqs.map(q=>q.id);
    const tpl=pickRandomSp(used);
    if(!tpl)return;
    const sq={...tpl,sqid:"sq_"+Date.now(),progress:0,startedAt:Date.now(),expiresAt:Date.now()+tpl.days*86400000,completedAt:null};
    setState(s=>({...s,specialQuests:[...s.specialQuests.filter(q=>q.completedAt),sq]}));
  }

  function fmtCD(ms){
    const d=Math.floor(ms/86400000),hh=Math.floor((ms%86400000)/3600000),mm=Math.floor((ms%3600000)/60000);
    if(d>0)return d+"j "+hh+"h";if(hh>0)return hh+"h "+mm+"min";return mm+"min";
  }

          ),
          h("div",{class:"mrow"},
            h("button",{class:"mbtn mdng",style:"flex:1",onClick:()=>{setState(s=>({...s,objectives:s.objectives.filter(o=>o.id!==confirmDelete)}));setConfirmDelete(null);}},"\u2705 Confirmer"),
            h("button",{class:"mbtn mcan",style:"flex:1",onClick:()=>setConfirmDelete(null)},"Annuler")
          )
        )
      )
    )
  );
}

render(h(App,null),document.getElementById("app"));
</script>
</body>
</html>
