
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<title>Solo Leveling — Val</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--rc:#9ca3af;--rg:#9ca3af55;--ra:#6b7280;--bg:#0a0a0f;--sf:rgba(255,255,255,0.03);--sf2:rgba(255,255,255,0.06);--tx:#e2e8f0;--td:#64748b}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Rajdhani',sans-serif;overflow-x:hidden}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:80px}
#app::before{content:'';position:fixed;top:0;left:50%;transform:translateX(-50%);width:430px;max-width:100vw;height:100vh;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);pointer-events:none;z-index:1000}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;animation:floatP linear infinite}
@keyframes floatP{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100px) scale(1);opacity:0}}
.hdr{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid rgba(255,255,255,0.06);padding:54px 20px 12px}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.pname{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--rc);text-shadow:0 0 20px var(--rg);letter-spacing:3px}
.gbtn{background:none;border:none;width:43px;height:43px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;color:var(--rc);transition:all .3s;opacity:.8}
.rbadge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.04);border:1px solid var(--rc);border-radius:20px;padding:4px 14px;margin-top:8px}
.rletter{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:var(--rc);text-shadow:0 0 15px var(--rg)}
.rlabel{font-size:13px;color:var(--rc);letter-spacing:2px;text-transform:uppercase}
.xpwrap{margin-top:10px}
.xplbl{display:flex;justify-content:space-between;font-size:11px;color:var(--td);margin-bottom:4px;font-family:'Orbitron',sans-serif}
.xpbar{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.xpfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ra),var(--rc));box-shadow:0 0 8px var(--rg);transition:width .6s}
.hstats{display:flex;gap:20px;margin-top:10px}
.hstat{text-align:center}
.hsval{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--rc)}
.hslbl{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:1px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:430px;max-width:100vw;background:var(--bg);border-top:1px solid rgba(255,255,255,0.06);display:flex;z-index:200}
.nbtn{flex:1;padding:12px 0;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--td);font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;transition:color .2s}
.nbtn.on{color:var(--rc)}
.nicon{font-size:20px}
.tab{padding:16px 16px 0;position:relative;z-index:1}
.card{background:var(--sf);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--rc),transparent);opacity:.4}
.ctitle{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:var(--rc);text-transform:uppercase;margin-bottom:12px}
.qi{background:var(--sf2);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px;margin-bottom:8px}
.qi.done{border-color:var(--rc);background:rgba(255,255,255,0.02)}
.qhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.qname{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.qrow{display:flex;align-items:center;gap:10px}
.qbar{flex:1;height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.qfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ra),var(--rc));transition:width .4s}
.qfill.done{background:linear-gradient(90deg,#16a34a,#4ade80);box-shadow:0 0 6px #4ade8088}
.qfill.over{background:linear-gradient(90deg,#d97706,#f59e0b);box-shadow:0 0 6px #f59e0b88}
.qxp{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--rc);min-width:50px;text-align:right}
.qinrow{display:flex;gap:8px;margin-top:8px}
.qin{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--rc);border-radius:8px;padding:8px 12px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;opacity:.8}
.qbtn{background:rgba(255,255,255,0.05);border:1px solid var(--rc);border-radius:8px;padding:8px 14px;color:var(--rc);cursor:pointer;font-family:'Orbitron',sans-serif;font-size:11px}
.xpfloat{position:fixed;pointer-events:none;z-index:800;font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--rc);text-shadow:0 0 10px var(--rg);animation:fup 1.2s ease-out forwards}
@keyframes fup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-80px)}}
.warn{background:#ef444411;border:1px solid #ef444466;border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:13px;color:#ef4444}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#0d0d18;border:1px solid var(--rc);border-radius:20px 20px 0 0;width:430px;max-width:100vw;max-height:85vh;overflow-y:auto;padding:24px 20px}
.mtitle{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:var(--rc);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.mlbl{font-size:12px;color:var(--td);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.msec{margin-bottom:20px}
.min{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--rc);border-radius:8px;padding:10px 14px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;margin-bottom:8px;opacity:.8}
.msel{width:100%;background:#0d0d18;border:1px solid var(--rc);border-radius:8px;padding:10px 14px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;margin-bottom:8px}
.mbtn{flex:1;padding:12px;border-radius:8px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;text-transform:uppercase}
.mprim{background:rgba(255,255,255,0.05);border:1px solid var(--rc);color:var(--rc)}
.mdng{background:#ef444411;border:1px solid #ef444466;color:#ef4444}
.mcan{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--td)}
.mrow{display:flex;gap:8px}
.addbtn{background:rgba(255,255,255,0.03);border:1px solid var(--rc);border-radius:8px;padding:5px 12px;color:var(--rc);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:1px;cursor:pointer;opacity:.8}
.addform{background:var(--sf);border:1px dashed var(--rc);border-radius:10px;padding:14px;margin-top:8px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ff{grid-column:1/-1}
.fin{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--rc);border-radius:8px;padding:8px 12px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;opacity:.8}
.fsel{width:100%;background:#0d0d18;border:1px solid var(--rc);border-radius:8px;padding:8px 12px;color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none}
.fck{font-size:12px;display:flex;align-items:center;gap:6px;color:var(--td)}
.delbtn{background:none;border:none;cursor:pointer;font-size:14px;color:#ef444488;padding:2px 6px;border-radius:4px}
.shdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.txp{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:var(--rc);text-shadow:0 0 20px var(--rg);text-align:center}
.txplbl{font-size:11px;color:var(--td);text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.ksg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ksb{background:var(--sf2);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px;text-align:center}
.ksv{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;color:var(--rc)}
.ksl{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.schr{margin-bottom:12px}
.schn{display:flex;justify-content:space-between;font-size:13px;font-weight:600;letter-spacing:1px;color:var(--tx);margin-bottom:5px}
.schlvl{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--rc)}
.schb{height:8px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden}
.schf{height:100%;border-radius:4px;transition:width .6s}
.rpath{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.rnode{display:flex;flex-direction:column;align-items:center;gap:4px}
.rcirc{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;border:2px solid;transition:all .3s}
.rname{font-size:9px;letter-spacing:1px;text-transform:uppercase}
.rconn{flex:1;height:2px;margin:0 4px;margin-bottom:16px}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wday{display:flex;flex-direction:column;align-items:center;gap:3px}
.wdlbl{font-size:9px;color:var(--td);text-transform:uppercase;letter-spacing:1px}
.wddot{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'Orbitron',sans-serif}
.ruov{position:fixed;inset:0;z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.95);animation:fdin .3s}
@keyframes fdin{from{opacity:0}to{opacity:1}}
.rulines{position:absolute;inset:0;overflow:hidden}
.ruline{position:absolute;height:2px;width:200px;background:linear-gradient(90deg,transparent,var(--rc),transparent);animation:shoot 1.5s linear infinite}
@keyframes shoot{0%{transform:translateX(-220px) rotate(var(--ang));opacity:0}50%{opacity:1}100%{transform:translateX(calc(100vw + 220px)) rotate(var(--ang));opacity:0}}
.rucont{text-align:center;z-index:1;animation:scin .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes scin{from{transform:scale(0.3);opacity:0}to{transform:scale(1);opacity:1}}
.rurank{font-family:'Orbitron',sans-serif;font-size:100px;font-weight:900;color:var(--rc);text-shadow:0 0 60px var(--rg);animation:prk 1s ease-in-out infinite alternate}
@keyframes prk{from{text-shadow:0 0 40px var(--rg)}to{text-shadow:0 0 80px var(--rg),0 0 30px var(--rc)}}
.rutitle{font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:5px;color:var(--td);text-transform:uppercase;margin-bottom:12px}
.rulabel{font-family:'Orbitron',sans-serif;font-size:20px;letter-spacing:6px;color:var(--rc);margin-top:8px;text-transform:uppercase}
.rudis{margin-top:40px;background:rgba(255,255,255,0.05);border:1px solid var(--rc);border-radius:8px;padding:12px 32px;color:var(--rc);font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;cursor:pointer;text-transform:uppercase}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--rc),transparent);margin:8px 0 16px;opacity:.3}
</style>
</head>
<body>
<div id="app"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Orbitron,sans-serif;color:#9ca3af;gap:16px"><div style="font-size:48px">⚔</div><div style="font-size:12px;letter-spacing:4px">CHARGEMENT...</div></div></div>
<script type="module">
import { h, render, Fragment } from 'https://esm.sh/preact@10.19.3';
import { useState, useEffect } from 'https://esm.sh/preact@10.19.3/hooks';

const RANKS = [
  {id:"E",label:"Éveillé",   color:"#9ca3af",glow:"#9ca3af55",bg:"#0a0a0f",accent:"#6b7280",xpRequired:0},
  {id:"D",label:"Aventurier",color:"#22d3ee",glow:"#22d3ee55",bg:"#000d12",accent:"#06b6d4",xpRequired:3000},
  {id:"C",label:"Combattant",color:"#4ade80",glow:"#4ade8055",bg:"#000d06",accent:"#22c55e",xpRequired:9000},
  {id:"B",label:"Chasseur",  color:"#f59e0b",glow:"#f59e0b55",bg:"#0d0800",accent:"#d97706",xpRequired:21000},
  {id:"A",label:"Expert",    color:"#f87171",glow:"#f87171aa",bg:"#0d0004",accent:"#ef4444",xpRequired:45000},
  {id:"S",label:"Maître",    color:"#c084fc",glow:"#c084fcaa",bg:"#0a0014",accent:"#a855f7",xpRequired:90000},
];
const STATS = ["Vitalité","Force","Intelligence","Endurance"];
const STAT_ORDER = ["Vitalité","Force","Intelligence","Endurance"];
const STAT_COLORS = {Vitalité:"#ef4444",Force:"#4ade80",Intelligence:"#f59e0b",Endurance:"#22d3ee"};

// Emojis définis via unicode pour éviter les problèmes de parsing
const E = {
  push:    "\uD83E\uDDBE",
  abs:     "\uD83E\uDDCE\uD83C\uDFFB\u200D\u2642\uFE0F",
  squats:  "\uD83E\uDDBF",
  water:   "\uD83D\uDCA7",
  reading: "\uD83D\uDCDA",
  run:     "\uD83C\uDFC3\uD83C\uDFFB",
  med:     "\uD83E\uDDD8\uD83C\uDFFB",
  flex:    "\uD83E\uDD38\uD83C\uDFFB",
  sleep:   "\uD83D\uDECF\uFE0F",
};

const DEFS = [
  {id:"push",   name:"Pompes",        unit:"reps",  xpPer:1,  daily:true, weekly:false,optional:false,stat:"Force",       icon:E.push,   base:30},
  {id:"abs",    name:"Abdominaux",    unit:"reps",  xpPer:1,  daily:true, weekly:false,optional:false,stat:"Force",       icon:E.abs,    base:60},
  {id:"squats", name:"Squats",        unit:"reps",  xpPer:2,  daily:true, weekly:false,optional:false,stat:"Force",       icon:E.squats, base:15},
  {id:"water",  name:"Boire de l'eau",unit:"verres",xpPer:5,  daily:true, weekly:false,optional:false,stat:"Vitalité",    icon:E.water,  base:8},
  {id:"reading",name:"Lecture",       unit:"pages", xpPer:1,  daily:true, weekly:false,optional:false,stat:"Intelligence",icon:E.reading,base:10},
  {id:"run",    name:"Course à pied", unit:"km",    xpPer:50, daily:false,weekly:true, optional:false,stat:"Endurance",   icon:E.run,    base:7},
  {id:"med",    name:"Méditation",    unit:"min",   xpPer:5,  daily:true, weekly:false,optional:true, stat:"Intelligence",icon:E.med,    base:5},
  {id:"flex",   name:"Souplesse",     unit:"min",   xpPer:5,  daily:true, weekly:false,optional:true, stat:"Force",       icon:E.flex,   base:5},
  {id:"sleep",  name:"Sommeil",       unit:"h",     xpPer:0,  daily:true, weekly:false,optional:true, stat:"Vitalité",    icon:E.sleep,  base:8,binary:true,binaryXp:50},
];

const IMPORTED = {
  totalXp:1202.5,
  streak:3,
  lastActiveDay:"2026-04-08",
  streakBonusDay:null,
  dailyLog:{
    "2026-04-06":{water:8,push:36,abs:72,sleep:8},
    "2026-04-07":{water:8,push:36,abs:72,reading:11,sleep:8,flex:5,med:6,squats:15},
    "2026-04-08":{water:3,push:70,abs:62,sleep:8,squats:35,reading:3,med:6}
  },
  weeklyLog:{"2026-W15":{run:6.92}},
  stats:{Vitalité:2,Force:4,Intelligence:0,Endurance:3},
  statXp:{Vitalité:245,Force:532,Intelligence:79.5,Endurance:346}
};

const getRank  = xp => { for(let i=RANKS.length-1;i>=0;i--)if(xp>=RANKS[i].xpRequired)return RANKS[i];return RANKS[0]; };
const getNext  = id => { const i=RANKS.findIndex(r=>r.id===id);return i<RANKS.length-1?RANKS[i+1]:null; };
const getTarget= (base,ri) => Math.round(base*Math.pow(1.25,ri));
const todayStr = () => new Date().toISOString().slice(0,10);
const wkStr    = (d=new Date()) => { const j=new Date(d.getFullYear(),0,1);return `${d.getFullYear()}-W${Math.ceil(((d-j)/86400000+j.getDay()+1)/7)}`; };
const sortStat = arr => [...arr].sort((a,b)=>STAT_ORDER.indexOf(a.stat)-STAT_ORDER.indexOf(b.stat));
const xpForLvl = l => Math.round(100*Math.pow(1.1,l));
const totForLvl= l => { let t=0;for(let i=0;i<l;i++)t+=xpForLvl(i);return t; };
const getLvl   = xp => { let l=0;while(xp>=totForLvl(l+1))l++;return l; };

function calcXp(obj,total,ri){
  if(total<=0)return 0;
  if(obj.binary){const t=getTarget(obj.base,ri);return total>=t?(obj.binaryXp||50):0;}
  const t=getTarget(obj.base,ri);
  if(total<=t)return total*obj.xpPer;
  return t*obj.xpPer+(total-t)*obj.xpPer*1.5;
}

const loadState = () => { try{const r=localStorage.getItem("sl_v3");return r?JSON.parse(r):null;}catch{return null;} };
const saveState = s => { try{localStorage.setItem("sl_v3",JSON.stringify(s));}catch{} };

function buildFromImported(){
  return {...IMPORTED, objectives:DEFS};
}

function emptyState(){
  return {totalXp:0,streak:0,lastActiveDay:null,streakBonusDay:null,objectives:DEFS,dailyLog:{},weeklyLog:{},
    stats:{Vitalité:0,Force:0,Intelligence:0,Endurance:0},statXp:{Vitalité:0,Force:0,Intelligence:0,Endurance:0}};
}

function migrate(saved){
  const P={push:{icon:E.push,stat:"Force",xpPer:1},abs:{icon:E.abs,stat:"Force",xpPer:1},squats:{icon:E.squats,stat:"Force",xpPer:2},
    water:{icon:E.water,stat:"Vitalité",xpPer:5},reading:{icon:E.reading,stat:"Intelligence",xpPer:1},
    run:{icon:E.run,stat:"Endurance",xpPer:50},med:{icon:E.med,stat:"Intelligence",xpPer:5},flex:{icon:E.flex,stat:"Force",xpPer:5}};
  let objs=saved.objectives.map(o=>P[o.id]?{...o,...P[o.id]}:o);
  if(!objs.find(o=>o.id==="sleep"))objs=[...objs,DEFS.find(o=>o.id==="sleep")];
  const stats={...(saved.stats||{})};
  delete stats["Agilit\u00e9"]; // supprime Agilité
  if(stats.Vitalité===undefined)stats.Vitalité=0;
  const statXp={...(saved.statXp||{})};
  delete statXp["Agilit\u00e9"];
  if(statXp.Vitalité===undefined)statXp.Vitalité=0;
  return {...saved,objectives:objs,stats,statXp};
}

function App(){
  const [state,setState]=useState(()=>{const s=loadState();return s?migrate(s):buildFromImported();});
  const [tab,setTab]=useState("home");
  const [showAdd,setShowAdd]=useState(false);
  const [rankUp,setRankUp]=useState(null);
  const [floats,setFloats]=useState([]);
  const inputs={}; // objet mutable - pas de re-render sur frappe
  const [newObj,setNewObj]=useState({name:"",unit:"reps",xpPer:1,daily:true,weekly:false,optional:false,stat:"Force",icon:"⚡",base:10});
  const [editObj,setEditObj]=useState(null);
  const [showSet,setShowSet]=useState(false);
  const [confirmReset,setConfirmReset]=useState(false);
  const [editDay,setEditDay]=useState({});
  const [wkOff,setWkOff]=useState(0);

  useEffect(()=>{saveState(state);},[state]);

  const rank=getRank(state.totalXp);
  useEffect(()=>{
    const r=document.documentElement.style;
    r.setProperty("--rc",rank.color);r.setProperty("--rg",rank.glow);
    r.setProperty("--ra",rank.accent);r.setProperty("--bg",rank.bg);
  },[rank.id]);

  useEffect(()=>{
    const t=todayStr();
    if(state.lastActiveDay&&state.lastActiveDay!==t){
      const diff=Math.round((new Date(t)-new Date(state.lastActiveDay))/86400000);
      if(diff>=2)setState(s=>({...s,totalXp:Math.max(0,s.totalXp-diff*10),streak:0}));
    }
  },[]);

  const today=todayStr(),wk=wkStr();
  const ri=RANKS.findIndex(r=>r.id===rank.id);
  const nextRank=getNext(rank.id);
  const xpInRank=state.totalXp-rank.xpRequired;
  const xpToNext=nextRank?nextRank.xpRequired-rank.xpRequired:1;

  function validate(obj,e){
    const val=parseFloat(inputs[obj.id]||0);if(!val||val<=0)return;

    let xp=0;
    if(obj.binary){const was=cur>=tgt,now=(cur+val)>=tgt;xp=(!was&&now)?(obj.binaryXp||50):0;}
    else{const nt=cur+val;if(cur>=tgt)xp=val*obj.xpPer*1.5;else if(nt<=tgt)xp=val*obj.xpPer;else{const n=tgt-cur;xp=n*obj.xpPer+(val-n)*obj.xpPer*1.5;}}
    setState(s=>{
      if(obj.weekly){const w={...s.weeklyLog};w[wk]={...(w[wk]||{}),[obj.id]:(w[wk]?.[obj.id]||0)+val};return{...s,weeklyLog:w,lastActiveDay:todayStr()};}
      const d={...s.dailyLog};d[today]={...(d[today]||{}),[obj.id]:(d[today]?.[obj.id]||0)+val};return{...s,dailyLog:d,lastActiveDay:todayStr()};
    });
    if(xp>0)addXp(xp,obj.stat,e);else if(obj.binary)spawnFloat("0 XP",e);
  }

  // ─── HISTORY ───────────────────────────────────────────────────────────────
  function History(){
    function getWS(off){const d=new Date();d.setDate(d.getDate()-((d.getDay()+6)%7)-off*7);d.setHours(0,0,0,0);return d;}
    function getWK(ws){const j=new Date(ws.getFullYear(),0,1);return ws.getFullYear()+'-W'+Math.ceil(((ws-j)/86400000+j.getDay()+1)/7);}
    const ws=getWS(wkOff),wKey=getWK(ws);
    const dt={};
    for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);const dk=d.toISOString().slice(0,10);Object.entries(state.dailyLog[dk]||{}).forEach(([id,v])=>{dt[id]=(dt[id]||0)+v;});}
    const tots={...dt,...(state.weeklyLog[wKey]||{})};
    const we=new Date(ws);we.setDate(ws.getDate()+6);
    const fmt=d=>d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0');
    const lbl=wkOff===0?"Cette semaine":wkOff===1?"Semaine dernière":fmt(ws)+" – "+fmt(we);
    const hasData=Object.values(tots).some(v=>v>0);
    const ordered=[...sortStat(state.objectives.filter(o=>o.daily&&!o.optional)),...sortStat(state.objectives.filter(o=>o.daily&&o.optional)),...sortStat(state.objectives.filter(o=>o.weekly))];

          h('div',{style:'text-align:center;flex:1'},
            h('div',{style:'font-family:Orbitron,sans-serif;font-size:12px;color:var(--rc);letter-spacing:1px'},lbl),
            h('div',{style:'font-size:10px;color:var(--td);margin-top:2px'},fmt(ws)+' – '+fmt(we))
          ),
          h('button',{style:'background:var(--sf2);border:1px solid var(--rc);border-radius:8px;color:var(--rc);font-size:18px;width:40px;height:40px;cursor:pointer;opacity:'+(wkOff===0?.3:.8),onClick:()=>setWkOff(o=>Math.max(o-1,0))},'›')
        ),

          const pct=Math.min(100,(val/wt)*100),complete=val>=wt;
          return h('div',{key:obj.id,style:'margin-bottom:10px'},
            h('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:4px'},
              h('span',{style:'font-size:13px;display:flex;align-items:center;gap:6px'},

                (val%1===0?val:val.toFixed(1)),h('span',{style:'color:var(--td)'},'/'+wt),' ',obj.unit,complete&&' ✅'
              )
            ),
            h('div',{class:'qbar',style:'height:5px'},h('div',{class:'qfill',style:'width:'+pct+'%;opacity:'+(val>0?1:0.15)}))

  // ─── SETTINGS ──────────────────────────────────────────────────────────────
  function Settings(){
    if(!showSet)return null;
    function applyEdit(){
      setState(s=>{
        let xpD=0;const ndl={...s.dailyLog},nwl={...s.weeklyLog},nsx={...s.statXp};
        Object.entries(editDay).forEach(([id,rv])=>{

          const obj=s.objectives.find(o=>o.id===id);if(!obj)return;
          const ov=obj.weekly?(s.weeklyLog[wk]?.[id]||0):(s.dailyLog[today]?.[id]||0);
          const tgt=getTarget(obj.base,ri);
          const oxp=calcXp(obj,ov,ri),nxp=calcXp(obj,nv,ri);
          xpD+=nxp-oxp;nsx[obj.stat]=Math.max(0,(nsx[obj.stat]||0)+(nxp-oxp));
          if(obj.weekly)nwl[wk]={...(nwl[wk]||{}),[id]:nv};else ndl[today]={...(ndl[today]||{}),[id]:nv};
        });
        const ns={...s.stats};Object.keys(nsx).forEach(st=>{ns[st]=getLvl(nsx[st]);});
        return {...s,totalXp:Math.max(0,s.totalXp+xpD),dailyLog:ndl,weeklyLog:nwl,statXp:nsx,stats:ns};
      });
      setEditDay({});setShowSet(false);
    }
    const ordered=[...sortStat(state.objectives.filter(o=>o.daily&&!o.optional)),...sortStat(state.objectives.filter(o=>o.daily&&o.optional)),...sortStat(state.objectives.filter(o=>o.weekly))];

      h('div',{class:'modal'},
        h('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:20px'},

        ),
        h('div',{class:'msec'},
          h('div',{class:'mlbl'},'📝 Corriger les données du jour'),
          h('div',{style:'font-size:11px;color:var(--td);margin-bottom:10px;line-height:1.5'},"Modifie les valeurs si tu t'es trompé. L'XP sera recalculé."),
          ordered.map(obj=>{
            const cur=obj.weekly?(wLog[obj.id]||0):(tLog[obj.id]||0);
            const val=editDay[obj.id]!==undefined?editDay[obj.id]:String(cur);
            return h('div',{key:obj.id,style:'display:flex;align-items:center;gap:10px;margin-bottom:8px'},
              h('span',{style:'font-size:16px;min-width:24px'},obj.icon),
              h('span',{style:'flex:1;font-size:13px'},obj.name),
              h('input',{class:'min',type:'text',inputMode:'decimal',value:val,onInput:e=>setEditDay(d=>({...d,[obj.id]:e.target.value})),style:'width:80px;margin:0;text-align:center'}),
              h('span',{style:'font-size:11px;color:var(--td);min-width:28px'},obj.unit)
            );
          }),
          h('button',{class:'mbtn mprim',style:'width:100%;margin-top:8px',onClick:applyEdit},'✅ Appliquer')
        ),
        h('div',{class:'divider'}),
        h('div',{class:'msec'},
          h('div',{class:'mlbl'},'💾 Sauvegarde / Restauration'),
          h('div',{style:'font-size:11px;color:var(--td);margin-bottom:10px;line-height:1.6'},'Exporte depuis Safari iPhone, importe sur Chrome PC (ou inversement).'),
          h('div',{class:'mrow',style:'margin-bottom:8px'},
            h('button',{class:'mbtn mprim',style:'flex:1',onClick:()=>{
              const json=JSON.stringify(state);
              navigator.clipboard.writeText(json).then(()=>alert('✅ Données copiées !\nColle-les dans une note.')).catch(()=>window.prompt('Copie ce texte :',json));
            }},'📋 Exporter'),
            h('button',{class:'mbtn mprim',style:'flex:1',onClick:()=>{
              const json=window.prompt('Colle tes données ici :');
              if(!json)return;
              try{setState(JSON.parse(json));alert('✅ Restauré !');setShowSet(false);}catch{alert('❌ Données invalides.');}
            }},'📥 Importer')
          )
        ),
        h('div',{class:'divider'}),
        h('div',{class:'msec'},
          h('div',{class:'mlbl'},'☠ Zone dangereuse'),
          !confirmReset
            ?h('button',{class:'mbtn mdng',style:'width:100%',onClick:()=>setConfirmReset(true)},'Réinitialiser toutes les données')
            :h('div',{style:'background:#ef444411;border:1px solid #ef444466;border-radius:8px;padding:12px'},
                h('div',{style:'font-size:13px;color:#ef4444;margin-bottom:12px;text-align:center;line-height:1.5'},'⚠️ Action irréversible.',h('br'),'Toute ta progression sera perdue.'),
                h('div',{class:'mrow'},
                  h('button',{class:'mbtn mdng',style:'flex:1',onClick:()=>{localStorage.removeItem("sl_v3");setState(emptyState());setConfirmReset(false);setShowSet(false);}},'✅ Confirmer'),
                  h('button',{class:'mbtn mcan',style:'flex:1',onClick:()=>setConfirmReset(false)},'Annuler')
                )
              )
        ),
      )
    );
  }

  function EditModal(){
    if(!editObj)return null;
    return h('div',{class:'modal-ov',onClick:e=>{if(e.target===e.currentTarget)setEditObj(null);}},
      h('div',{class:'modal'},
        h('div',{class:'mtitle'},'✏️ Modifier la quête'),
        h('div',{class:'fg',style:'display:grid;grid-template-columns:1fr 1fr;gap:8px'},
          h('input',{class:'fin ff',placeholder:'Nom',value:editObj.name,onInput:e=>setEditObj(v=>({...v,name:e.target.value}))}),
          h('input',{class:'fin',placeholder:'Icône',value:editObj.icon,onInput:e=>setEditObj(v=>({...v,icon:e.target.value}))}),
          h('input',{class:'fin',placeholder:'Unité',value:editObj.unit,onInput:e=>setEditObj(v=>({...v,unit:e.target.value}))}),
          h('input',{class:'fin',type:'number',placeholder:'XP/unité',value:editObj.xpPer,onInput:e=>setEditObj(v=>({...v,xpPer:parseFloat(e.target.value)}))}),
          h('input',{class:'fin',type:'number',placeholder:'Objectif base',value:editObj.base,onInput:e=>setEditObj(v=>({...v,base:parseInt(e.target.value)}))}),
          h('select',{class:'fsel ff',value:editObj.stat,onChange:e=>setEditObj(v=>({...v,stat:e.target.value}))},STATS.map(s=>h('option',{key:s,value:s},s))),
          h('label',{class:'fck',style:'font-size:13px'},h('input',{type:'checkbox',checked:editObj.optional,onChange:e=>setEditObj(v=>({...v,optional:e.target.checked}))}),'Bonus'),
          h('label',{class:'fck',style:'font-size:13px'},h('input',{type:'checkbox',checked:editObj.weekly,onChange:e=>setEditObj(v=>({...v,weekly:e.target.checked,daily:!e.target.checked}))}),'Hebdo')
        ),
        h('div',{class:'mrow',style:'margin-top:16px'},
          h('button',{class:'mbtn mprim',style:'flex:2',onClick:()=>{setState(s=>({...s,objectives:s.objectives.map(o=>o.id===editObj.id?editObj:o)}));setEditObj(null);}},'✅ Sauvegarder'),
          h('button',{class:'mbtn mcan',style:'flex:1',onClick:()=>setEditObj(null)},'Annuler')
        )
      )
    );
  }

  function RankUp(){
    if(!rankUp)return null;
    const lines=Array.from({length:12},(_,i)=>({t:Math.random()*100+'%',l:Math.random()*100+'%',a:(Math.random()-.5)*40+'deg',d:Math.random()*1.5+'s'}));
    return h('div',{class:'ruov',style:'--rc:'+rankUp.color+';--rg:'+rankUp.glow},
      h('div',{class:'rulines'},lines.map((l,i)=>h('div',{key:i,class:'ruline',style:'top:'+l.t+';left:'+l.l+';--ang:'+l.a+';animation-delay:'+l.d}))),
      h('div',{class:'rucont'},
        h('div',{class:'rutitle'},'Rang atteint'),
        h('div',{class:'rurank'},rankUp.id),
        h('div',{class:'rulabel'},rankUp.label),
        h('button',{class:'rudis',onClick:()=>setRankUp(null)},'Continuer')
      )
    );
  }

  const parts=Array.from({length:15},(_,i)=>({id:i,s:Math.random()*3+1,l:Math.random()*100,dur:Math.random()*10+8,del:Math.random()*10}));

  return h(Fragment,null,
    h('div',{id:'app'},
      h('div',{class:'particles'},parts.map(p=>h('div',{key:p.id,class:'particle',style:'width:'+p.s+'px;height:'+p.s+'px;left:'+p.l+'%;bottom:-10px;background:'+rank.color+';box-shadow:0 0 4px '+rank.glow+';animation-duration:'+p.dur+'s;animation-delay:'+p.del+'s'}))),
      h('div',{class:'hdr'},
        h('div',{class:'hdr-top'},
          h('div',null,h('div',{class:'pname'},'VAL'),h('div',{class:'rbadge'},h('span',{class:'rletter'},rank.id),h('span',{class:'rlabel'},rank.label))),
          h('button',{class:'gbtn',onClick:()=>setShowSet(true)},'⚙')
        ),
        h('div',{class:'xpwrap'},
          h('div',{class:'xplbl'},h('span',null,'XP'),h('span',null,nextRank?xpInRank.toFixed(0)+' / '+xpToNext.toFixed(0):'MAÎTRE')),
          h('div',{class:'xpbar'},h('div',{class:'xpfill',style:'width:'+rankPct+'%'}))
        ),
        h('div',{class:'hstats'},
          h('div',{class:'hstat'},h('div',{class:'hsval'},'🔥 '+state.streak),h('div',{class:'hslbl'},'Streak')),
          h('div',{class:'hstat'},h('div',{class:'hsval'},todayXp.toFixed(0)),h('div',{class:'hslbl'},'XP jour')),
          h('div',{class:'hstat'},h('div',{class:'hsval'},state.totalXp.toFixed(0)),h('div',{class:'hslbl'},'XP total'))
        )
      ),
      tab==='home'&&h(Home,null),
      tab==='quests'&&h(Quests,null),
      tab==='stats'&&h(Stats,null),
      tab==='history'&&h(History,null),
      h('nav',{class:'nav'},
        [['home','🏠','Accueil'],['quests','⚔','Quêtes'],['stats','📊','Stats'],['history','📅','Historique']].map(([id,icon,lbl])=>
          h('button',{key:id,class:'nbtn '+(tab===id?'on':''),onClick:()=>setTab(id)},h('span',{class:'nicon'},icon),lbl)
        )
      ),
      floats.map(f=>h('div',{key:f.id,class:'xpfloat',style:'left:'+f.x+'px;top:'+f.y+'px'},f.txt)),
      h(EditModal,null),
      h(Settings,null),
      h(RankUp,null)
    )
  );
}

render(h(App,null),document.getElementById('app'));
</script>
</body>
</html>
